<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <style>
    :root { --fg: #1c1e21; --bg: #ffffff; --muted: #5b6068; --accent: #0b6e4f; --border: #e3e5e8; --code-bg: #f5f6f7; }
    @media (prefers-color-scheme: dark) {
      :root { --fg: #e6e6e6; --bg: #131516; --muted: #9aa0a6; --accent: #5dd39e; --border: #2c2f33; --code-bg: #1d2021; }
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: 16px/1.65 system-ui, sans-serif; color: var(--fg); background: var(--bg); }
    header { border-bottom: 1px solid var(--border); }
    header .inner, main { max-width: 52rem; margin: 0 auto; padding: 0 1.25rem; }
    header .inner { display: flex; align-items: baseline; gap: 1.5rem; padding-top: 1rem; padding-bottom: 1rem; }
    header a { color: var(--fg); text-decoration: none; font-weight: 600; }
    header nav a { color: var(--muted); font-weight: 400; }
    header nav a:hover { color: var(--accent); }
    main { padding-top: 2rem; padding-bottom: 4rem; }
    h1, h2, h3 { line-height: 1.25; }
    a { color: var(--accent); }
    code { background: var(--code-bg); padding: 0.1em 0.35em; border-radius: 4px; font-size: 0.9em; }
    pre { background: var(--code-bg); padding: 1rem; border-radius: 8px; overflow-x: auto; }
    pre code { background: none; padding: 0; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid var(--border); padding: 0.4rem 0.6rem; text-align: left; }
    blockquote { border-left: 3px solid var(--accent); margin-left: 0; padding-left: 1rem; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div class="inner">
      <a href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
      <nav><a href="{{ "/design/" | relURL }}">Design</a></nav>
    </div>
  </header>
  <main>{{ block "main" . }}{{ end }}</main>
</body>
</html>
