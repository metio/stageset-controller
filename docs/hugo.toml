baseURL = "https://stageset.projects.metio.wtf/"
locale = "en"
defaultContentLanguage = "en"
theme = "metio"
title = "StageSet Controller"

enableGitInfo = true
enableRobotsTXT = true
enableInlineShortcodes = true
pygmentsUseClasses = true

# The runbook pages contain inline HTML; Goldmark must pass it through rather than
# strip it.
[markup.goldmark.renderer]
  unsafe = true

[outputs]
  home = ["HTML", "RSS", "ATOM", "HUMANS", "FOAF", "LLMS", "LLMSINDEX"]
  section = ["HTML", "RSS", "ATOM"]
  term = ["HTML", "RSS", "ATOM"]

[params]
  mainSections = ["get-started", "guides", "defining-a-release", "gating", "security", "integrations", "running", "observability", "cli", "api", "reference", "comparisons", "runbooks", "contributing"]
  author = "metio.wtf"
  github = "metio/stageset-controller"
  # Header mark (rendered left of the title) plus the favicon link set; the image
  # assets live under docs/static/.
  logo = "/images/logo.svg"
  favicons = true
  # 1200x630 link-preview card (Open Graph / Twitter image). Read by Mastodon,
  # Bluesky, LinkedIn, Facebook, Instagram and X when a page URL is shared.
  socialImage = "/og-image.png"
  # Author byline that Mastodon renders on a shared page's link-preview card.
  # Metadata only — this does not add any link to the site header.
  fediverseCreator = "@sebhoss@mastodon.online"
  # twitter = "metio_wtf"   # X/Twitter @site handle (no account yet)
  # Render the per-page "see history" / "edit this page" icons next to the title.
  # editContentPath is the repo-root-relative path to this content tree, joined
  # with each page's .File.Path to build the GitHub URLs.
  editContentPath = "docs/content"
  editBranch = "main"
  work = "stageset.projects.metio.wtf"
  description = "ordered, gated, multi-stage delivery of Flux sources (Git, OCI, Bucket, ExternalArtifact)"
  # Cross-project JSON-LD link (emitted as schema.org mentions on the home page).
  relatedProjects = [{ name = "Jsonnet-as-a-Service", url = "https://jaas.projects.metio.wtf/" }]

# Navigation. The theme renders a main-menu entry with a child list only when it
# has children. The menu is a reader's journey — most important first — and each
