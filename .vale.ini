#
# Prose linting via the shared metio/vale-config "complete package". `vale sync`
# downloads it into .vale/styles (git-ignored) and merges its StylesPath, so the
# Metio rules, the vocabulary, and the config (BasedOnStyles, Vocab, alert level)
# are all inherited — nothing else needs setting here.
StylesPath = .vale/styles
Packages = https://github.com/metio/vale-config/releases/latest/download/Metio.zip
