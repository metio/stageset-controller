apiVersion: v1
kind: Namespace
metadata:
  name: stageset-system
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: stageset-controller
  namespace: stageset-system
---
# Binds the controller's ServiceAccount to the controller-gen ClusterRole in
# config/rbac/role.yaml (StageSet/StageInventory/ExternalArtifact access). The
# permissions to apply the manifests a StageSet renders are NOT granted here:
# the controller is expected to impersonate spec.serviceAccountName for cluster
# writes, so each tenant's RBAC bounds what its StageSets can touch.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: stageset-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: stageset-controller
subjects:
  - kind: ServiceAccount
    name: stageset-controller
    namespace: stageset-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stageset-controller
  namespace: stageset-system
  labels:
    app.kubernetes.io/name: stageset-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stageset-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stageset-controller
    spec:
      serviceAccountName: stageset-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/metio/stageset-controller:latest
          args:
            - --leader-elect
            - --enable-webhook=false
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            - --gate-bind-address=:8082
          ports:
            - name: metrics
              containerPort: 8080
            - name: gate
              containerPort: 8082
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          # The root filesystem is read-only; the artifact fetcher (and kustomize
          # build) write tempfiles under /tmp, so back it with a writable emptyDir.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
