                            while the stage soaks. It catches a crashloop or an OOM-after-warm-up that
                            leaves the workload Ready (so ReadyChecks pass) while individual pods keep
                            restarting — the dependency-free companion to a soak.
                          properties:
                            checks:
                              description: |-
                                Checks are the pod groups to watch; a breach in any one blocks promotion.
                                Set several (e.g. an API and a worker) with independent tolerances.
                              items:
                                description: |-
                                  RestartCheck blocks a stage's promotion when one group of pods restarts more
                                  than maxRestarts times. Pods are selected by label (in the StageSet's
                                  namespace), so the group is not tied to a single workload kind — it can span
                                  Deployments, StatefulSets, DaemonSets, Jobs, or a custom controller. The pods
                                  must be observable by the controller (the same cluster, or the one the stage's
                                  kubeConfig targets).
                                properties:
                                  maxRestarts:
                                    description: |-
                                      MaxRestarts is the total container restarts — summed across the selected
                                      pods' init and regular containers — tolerated before the check fails.
                                      Defaults to 0: no restarts allowed.
                                    format: int32
                                    minimum: 0
                                    type: integer
                                  name:
                                    description: |-
                                      Name identifies the check in status, events, and the Ready message. Unique
                                      within a stage's promotion.
                                    type: string
                                  onFailure:
                                    description: |-
                                      OnFailure overrides the gate's default action for this check (Hold or
                                      Rollback). Defaults to the RestartGate's onFailure.
                                    enum:
                                    - Hold
                                    - Rollback
                                    type: string
                                  selector:
                                    description: |-
                                      Selector chooses the pods this check watches, in the StageSet's namespace.
                                      It must match at least one label; an empty selector (which would match every
                                      pod) is rejected.
                                    properties:
                                      matchExpressions:
                                        description: matchExpressions is a list of
                                          label selector requirements. The requirements
                                          are ANDed.
                                        items:
                                          description: |-
                                            A label selector requirement is a selector that contains values, a key, and an operator that
                                            relates the key and values.
                                          properties:
                                            key:
                                              description: key is the label key that
                                                the selector applies to.
                                              type: string
                                            operator:
                                              description: |-
                                                operator represents a key's relationship to a set of values.
                                                Valid operators are In, NotIn, Exists and DoesNotExist.
                                              type: string
                                            values:
                                              description: |-
                                                values is an array of string values. If the operator is In or NotIn,
                                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                                the values array must be empty. This array is replaced during a strategic
                                                merge patch.
                                              items:
                                                type: string
                                              type: array
                                              x-kubernetes-list-type: atomic
                                          required:
                                          - key
                                          - operator
                                          type: object
                                        type: array
                                        x-kubernetes-list-type: atomic
                                      matchLabels:
                                        additionalProperties:
                                          type: string
                                        description: |-
                                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                                        type: object
                                    type: object
                                    x-kubernetes-map-type: atomic
                                required:
                                - name
                                - selector
                                type: object
                              type: array
                              x-kubernetes-list-map-keys:
                              - name
                              x-kubernetes-list-type: map
                            onFailure:
                              description: |-
                                OnFailure is the default action when a check breaches: Hold (the default)
                                parks the rollout at this stage and surfaces why; Rollback reverts the stage
                                to its last-good revision — reusing spec.rollbackOnFailure's snapshots,
                                scoped to this stage — and parks the failing revision so it isn't re-applied
                                each reconcile. With no snapshot available a rollback degrades to a hold. A
                                check may override this with its own onFailure.
                              enum:
                              - Hold
                              - Rollback
                              type: string
                          required:
                          - checks
                          type: object
                        soak:
                          description: |-
                            Soak holds the rollout at this stage for the given duration after it
                            becomes Ready, advancing only if it stays healthy for the whole window.
                            This catches delayed regressions (OOM after warm-up, error-rate creep,
                            crashloop-after-N-minutes) that point-in-time ReadyChecks miss. The soak
                            gates only advancement to the next stage; drift on this stage's applied
                            revision keeps being corrected during the window. Defaults to no soak.
                          type: string
                      type: object
                    prune:
                      description: |-
                        Prune enables garbage collection of objects that fell out of this
                        stage. Defaults to true.
                      type: boolean
                    readyChecks:
                      description: ReadyChecks gate stage completion; purely observational.
                      properties:
                        checks:
                          description: |-
                            Checks lists explicit objects evaluated with kstatus, gating the stage on
                            objects it did not itself apply.

                            Cluster-scoped kinds are supported despite the reference type's name:
                            gating a stage on a CustomResourceDefinition, ClusterRole, Namespace,
                            PersistentVolume, or StorageClass is the ordering these checks exist for.
                            The namespace field is ignored for such a kind — a cluster-scoped object
                            has none — and defaults to the StageSet's namespace for a namespaced kind
                            when left empty. Scope is resolved against the target cluster, so a
                            spec.kubeConfig stage is judged by the remote cluster's own API surface.
                          items:
                            description: |-
                              NamespacedObjectKindReference contains enough information to locate the typed referenced Kubernetes resource object
                              in any namespace.
                            properties:
                              apiVersion:
                                description: API version of the referent, if not specified
                                  the Kubernetes preferred version will be used.
                                type: string
                              kind:
                                description: Kind of the referent.
                                type: string
                              name:
                                description: Name of the referent.
                                type: string
                              namespace:
                                description: Namespace of the referent, when not specified
                                  it acts as LocalObjectReference.
                                type: string
                            required:
                            - kind
                            - name
                            type: object
                          type: array
                        disableWait:
                          description: DisableWait opts the stage out of the default
                            kstatus wait.
                          type: boolean
                        exprs:
                          description: |-
                            Exprs lists CEL health checks, shape-compatible with
                            kustomize-controller's healthCheckExprs.
                          items:
                            description: CustomHealthCheck is a CEL-based readiness
                              rule for a group-version-kind.
                            properties:
                              apiVersion:
                                description: APIVersion of the target kind.
                                type: string
                              current:
                                description: Current is the CEL expression for the
                                  ready state.
                                type: string
                              failed:
                                description: Failed is the CEL expression for the
                                  failed state.
                                type: string
                              inProgress:
                                description: InProgress is the CEL expression for
                                  the progressing state.
                                type: string
                              kind:
                                description: Kind of the target.
                                type: string
                            required:
                            - apiVersion
                            - kind
                            type: object
                          type: array
                        timeout:
                          description: Timeout for readiness evaluation.
                          type: string
                      type: object
                    serviceAccountName:
                      description: |-
                        ServiceAccountName impersonated for THIS stage's cluster operations —
                        apply, prune, readiness verification, and actions — overriding the
                        StageSet-level spec.serviceAccountName. Empty inherits the StageSet
                        default. Lets a single StageSet drive stages that target different
                        tenants, each stage's writes bounded by its own ServiceAccount's RBAC.
                        SOPS decryption keys stay read under the StageSet-level identity
                        (spec.decryption is a StageSet field, not a per-stage one).
                      type: string
                    sourceRef:
                      description: |-
                        SourceRef references the ExternalArtifact providing this stage's
                        manifests.
                      properties:
                        apiVersion:
                          description: |-
                            APIVersion of the referent. Defaults to
                            source.toolkit.fluxcd.io/v1. Required when Kind is set to a
                            producer kind.
                          type: string
                        kind:
                          description: |-
                            Kind of the referent. Defaults to ExternalArtifact; any other kind
                            is treated as a producer and resolved via the back-pointer index.
                          type: string
                        name:
                          description: Name of the referent.
                          type: string
                        namespace:
                          description: |-
                            Namespace of the referent; defaults to the StageSet's namespace.
                            Cross-namespace references are gated by --no-cross-namespace-refs.
                          type: string
                      required:
                      - name
                      type: object
                    timeout:
                      description: Timeout overrides the StageSet-level default for
                        this stage.
                      type: string
                  required:
                  - name
                  - sourceRef
                  type: object
                minItems: 1
                type: array
              suspend:
                description: Suspend pauses reconciliation.
                type: boolean
              timeout:
                description: Timeout is the default per-stage timeout, overridable
                  per stage.
                type: string
              updateWindows:
                description: |-
                  UpdateWindows gate when new revisions may roll out. Empty means always.
                  Deny windows take precedence; if any Allow window is declared, updates
                  happen only while an Allow is active and no Deny is.
                items:
                  description: |-
                    UpdateWindow is one allow/deny window. It is either recurring (schedule +
                    duration) or absolute (from + to), never both.
                  properties:
                    duration:
                      description: Duration of a recurring window.
                      type: string
                    from:
                      description: |-
                        From is the start of an absolute one-off window; mutually exclusive with
                        schedule.
                      format: date-time
                      type: string
                    schedule:
                      description: |-
                        Schedule is a standard 5-field cron expression for a recurring window's
                        start. Requires duration; mutually exclusive with from/to.
                      type: string
                    timeZone:
                      description: TimeZone is the IANA name the schedule is evaluated
                        in. Defaults to UTC.
                      type: string
                    to:
                      description: To is the exclusive end of an absolute window.
                      format: date-time
                      type: string
                    type:
                      description: Type is Allow or Deny. Deny takes precedence over
                        Allow.
                      enum:
                      - Allow
                      - Deny
                      type: string
                  required:
                  - type
                  type: object
                type: array
              version:
                description: |-
                  Version identifies the deployed system's version so versioned
                  migrations can gate on transitions. Unset disables versioning and
                  migrations entirely.
                properties:
                  fromArtifact:
                    description: |-
                      FromArtifact reads a single semver string from a file in a stage's
                      artifact (e.g. a VERSION file committed beside the manifests), so the
                      version moves with the content. Suited to Git/OCI/Bucket sources that can
                      carry an extra file.
                    properties:
                      path:
                        description: Path of the version file inside the artifact.
                        type: string
                      stage:
                        description: Stage whose artifact carries the version file.
                        type: string
                    required:
                    - path
                    - stage
                    type: object
                  fromObject:
                    description: |-
                      FromObject reads the version from a field of a rendered object in a stage
                      — by default the standard app.kubernetes.io/version label. The version
                      travels inside the manifests themselves, so it works for every source kind
                      including a single-document renderer like JaaS, which has no room for a
                      separate version file.
                    properties:
                      apiVersion:
                        description: |-
                          APIVersion of the object; empty matches on Kind and Name alone (the
                          common case, where one Kind+Name pair is unambiguous within a stage).
                        type: string
                      fieldPath:
                        description: |-
                          FieldPath is a kubectl-style JSONPath to the version string, e.g.
                          '{.spec.template.spec.containers[0].image}'. Empty defaults to the
                          app.kubernetes.io/version label — the Kubernetes-recommended place for an
                          application's version, which well-formed manifests already set.
                        type: string
                      kind:
                        description: Kind of the object to read (e.g. Deployment).
                        type: string
                      name:
                        description: Name of the object to read.
                        type: string
                      stage:
                        description: |-
                          Stage whose rendered manifests carry the version. A StageSet has one
                          version that all its stages converge on, so this only names which stage's
                          output to read it from — normally the leading stage, which carries the new
                          version first. Empty defaults to the first stage.
                        type: string
                    required:
                    - kind
                    - name
                    type: object
                  requireApproval:
                    description: |-
                      RequireApproval holds a version transition that has pending migrations
                      until an operator approves the target version with the
                      stages.metio.wtf/approved-version annotation, so destructive migrations
                      don't run unattended. Off by default.
                    type: boolean
                  requireMigrationCoverage:
                    description: |-
                      RequireMigrationCoverage fails the reconcile when a version transition
                      crosses a major-version boundary with no migration covering it, instead of
                      advancing the major change silently. Off by default.
                    type: boolean
                  value:
                    description: Value pins the version inline, for fully pin-tagged
                      setups.
                    type: string
                type: object
              windowScope:
                description: |-
                  WindowScope chooses what a closed update window blocks: Updates
                  (default — hold only new-revision rollouts, keep correcting drift) or
                  All (hard freeze — also pause drift correction).
                enum:
                - Updates
                - All
                type: string
            required:
            - stages
            type: object
          status:
            description: StageSetStatus records the observed state of a StageSet.
            properties:
              actionFailureCount:
                description: |-
                  ActionFailureCount counts consecutive failures of a stage whose action
                  ladder still has a scope: Lifetime action to complete. Once it reaches the
                  controller's threshold the stage goes ActionDirty (auto-retry halts) so a
                  destructive bootstrap is not re-attempted against an uncertain state. Reset
                  to zero on a successful reconcile or a manual reconcile request.
                format: int32
                type: integer
              budgetFreeze:
                description: |-
                  BudgetFreeze is set while an error-budget freeze holds new-revision
                  rollouts (or, under dryRun, while a freeze would hold them). It surfaces the
                  last observed remaining budget so a wrong query doesn't hide.
                properties:
                  dryRun:
                    description: DryRun is true when the freeze is recorded but not
                      enforced.
                    type: boolean
                  freezeThreshold:
                    description: FreezeThreshold echoes the threshold the freeze tripped
                      at.
                    type: string
                  remaining:
                    description: |-
                      Remaining is the last observed remaining-budget scalar, as a decimal
                      string, so an operator can see whether the source returns what they expect.
                    type: string
                  resumeThreshold:
                    description: ResumeThreshold echoes the threshold the freeze will
                      resume at.
                    type: string
                  since:
                    description: Since is when the freeze began.
                    format: date-time
                    type: string
                type: object
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              executedMigrationActions:
                description: |-
                  ExecutedMigrationActions is the per-action migration ledger:
                  "name@contentDigest/actionName" keys of individual migration actions
                  already completed. It lets a retry of a partially-applied migration skip
                  actions that already ran, so a destructive action is never re-executed
                  after a mid-migration failure. Cleared with ExecutedMigrations once
                  status.version reaches the target.
                items:
                  type: string
                type: array
              executedMigrations:
                description: |-
                  ExecutedMigrations is the in-flight migration ledger: the
                  "name@contentDigest" keys of migrations fully completed for the current
                  version transition. Keying on the content digest means an edited
                  migration (same name, changed content) is treated as a new, unexecuted
                  migration rather than silently skipped. Lets a retry of a
                  partially-applied transition skip finished migrations; cleared once
                  status.version reaches the target.
                items:
                  type: string
                type: array
              lastAppliedRevisions:
                additionalProperties:
                  type: string
                description: |-
                  LastAppliedRevisions holds the revisions of the last fully
                  successful run.
                type: object
              lastAppliedSnapshot:
                description: |-
                  LastAppliedSnapshot records, per stage, the artifact coordinates of the
                  last fully-successful run. rollbackOnFailure re-fetches these
                  revisions and re-renders them under the current spec — a pointer to the
                  producer's immutable, revision-addressed content rather than a copy of
                  the rendered output (which would reintroduce Helm's release-size limit).
                items:
                  description: |-
                    StageArtifactRef pins a stage's resolved artifact so a later run can re-fetch
                    exactly that revision (digest-verified).
                  properties:
                    digest:
                      description: Digest (algo:hex) the tarball must match on re-fetch.
                      type: string
                    revision:
                      description: Revision is the human-readable revision identifier.
                      type: string
                    stage:
                      description: Stage name this artifact backed.
                      type: string
                    substitutionDigest:
                      description: |-
                        SubstitutionDigest is a sha256 fingerprint over the resolved postBuild
                        substitution inputs used for this stage's last good apply. It is a digest
                        only — it carries no substituteFrom secret VALUES, so it is safe in
                        status. On rollback the controller re-resolves substitution and, if the
                        fingerprint no longer matches, refuses to restore (terminal) rather than
                        silently re-rendering the old artifact with changed inputs.
                      type: string
                    url:
                      description: URL of the artifact tarball.
                      type: string
                  required:
                  - digest
                  - stage
                  - url
                  type: object
                type: array
              lastAttemptedRevisions:
                additionalProperties:
                  type: string
                description: |-
                  LastAttemptedRevisions pins the artifact revisions of the current or
                  last run, keyed by "namespace/name" of the ExternalArtifact.
                type: object
              lastHandledBudgetOverride:
                description: |-
                  LastHandledBudgetOverride is the value of the most recently honored
                  stages.metio.wtf/budget-override annotation, so an override fires once.
                type: string
              lastHandledReconcileAt:
                description: |-
                  LastHandledReconcileAt holds the value of the most recent
                  reconcile request value, so a change of the annotation value
                  can be detected.
                type: string
              lastHandledResetScope:
                description: |-
                  LastHandledResetScope is the value of the most recently honored
                  stages.metio.wtf/reset-scope annotation, so a Version-ledger reset fires
                  once. A reset clears every stage's version ledger, re-running scope:
                  Version actions at the unchanged version — the deliberate "re-run the
                  upgrade" escape hatch (stagesetctl reconcile --reset-scope=Version).
                type: string
              lastHandledUpdateOverride:
                description: |-
                  LastHandledUpdateOverride is the value of the most recently honored
                  stages.metio.wtf/update-now annotation, so an override fires once.
                type: string
              migrationFailureCount:
                description: |-
                  MigrationFailureCount counts consecutive migration failures in the current
                  transition. Once it reaches the controller's threshold the migration goes
                  MigrationDirty (auto-retry halts). Reset to zero on a successful transition
                  or a manual reconcile request.
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the last spec generation reconciled.
                format: int64
                type: integer
              pendingMigrations:
                description: |-
                  PendingMigrations lists the migrations the next run will execute, with
                  enough detail (boundary, resolved anchor stage, action verbs, content
                  digest) that operators see exactly what destructive work is about to run
                  — including for a ladder sourced from spec.migrationsSourceRef, whose
                  content is not in the spec.
                items:
                  description: |-
                    PendingMigration is a status preview of a migration the next run will execute:
                    its boundary, the concrete stage it anchors before, the action verbs it runs,
                    and its content digest — so operators see what is about to happen even when the
                    ladder is sourced from an artifact rather than the spec.
                  properties:
                    actions:
                      description: Actions lists the action verbs (e.g. delete, apply,
                        job) in run order.
                      items:
                        type: string
                      type: array
                    digest:
                      description: Digest is the migration's resolved content digest,
                        the idempotency-ledger key.
                      type: string
                    from:
                      description: From is the optional version constraint it applies
                        from.
                      type: string
                    name:
                      description: Name of the migration.
                      type: string
                    stage:
                      description: Stage is the concrete stage this migration resolved
                        to anchor before.
                      type: string
                    to:
                      description: To is the version boundary this migration crosses
                        up to.
                      type: string
                  required:
                  - name
                  - to
                  type: object
                type: array
              pendingUpdate:
                description: |-
                  PendingUpdate is set when an update window is holding a rollout (or a
                  hard freeze is active); cleared once an update applies.
                properties:
                  nextWindowOpens:
                    description: NextWindowOpens is when delivery may resume.
                    format: date-time
                    type: string
                  revisions:
                    additionalProperties:
                      type: string
                    description: |-
                      Revisions held back, keyed by "namespace/name" of the ExternalArtifact.
                      Empty when a hard freeze pauses an otherwise steady reconcile.
                    type: object
                type: object
              stages:
                description: Stages reports per-stage progress.
                items:
                  description: StageStatus reports the progress of one stage.
                  properties:
                    appliedRevision:
                      description: AppliedRevision is the artifact revision last applied
                        by this stage.
                      type: string
                    budgetFreeze:
                      description: |-
                        BudgetFreeze is set while this stage's own errorBudget is holding a
                        new-revision entry into the stage (or, under dryRun, would hold it).
                      properties:
                        dryRun:
                          description: DryRun is true when the freeze is recorded
                            but not enforced.
                          type: boolean
                        freezeThreshold:
                          description: FreezeThreshold echoes the threshold the freeze
                            tripped at.
                          type: string
                        remaining:
                          description: |-
                            Remaining is the last observed remaining-budget scalar, as a decimal
                            string, so an operator can see whether the source returns what they expect.
                          type: string
                        resumeThreshold:
                          description: ResumeThreshold echoes the threshold the freeze
                            will resume at.
                          type: string
                        since:
                          description: Since is when the freeze began.
                          format: date-time
                          type: string
                      type: object
                    entriesCount:
                      description: EntriesCount is the number of inventory entries
                        the stage owns.
                      format: int64
                      type: integer
                    executedActions:
                      description: |-
                        ExecutedActions lists the action names already run at LedgerRevision, so
                        retries and controller restarts never re-fire a side effect for the same
                        pinned snapshot.
                      items:
                        type: string
                      type: array
                    executedVersionActions:
                      description: |-
                        ExecutedVersionActions lists the scope: Version action names already run at
                        LedgerVersion — the version ledger, parallel to ExecutedActions but keyed
                        on the resolved spec.version episode rather than the revision. It survives
                        a revision change and a force-reconcile; it resets only when the resolved
                        version changes.
                      items:
                        type: string
                      type: array
                    lastHandledPromotion:
                      description: |-
                        LastHandledPromotion is the stages.metio.wtf/promote token this stage most
                        recently acted on, so a manual promotion fires exactly once per new token.
                      type: string
                    lastHandledReconcileAt:
                      description: |-
                        LastHandledReconcileAt is the value of the stages.metio.wtf/reconcile-stage
                        token this stage most recently acted on. A single-stage force-reconcile
                        clears this stage's action ledger and re-runs its actions exactly once per
                        new token, the per-stage analogue of lastHandledReconcileAt.
                      type: string
                    ledgerRevision:
                      description: |-
                        LedgerRevision is the pinned artifact revision the ExecutedActions ledger
                        applies to; a new revision resets the ledger.
                      type: string
                    ledgerVersion:
                      description: |-
                        LedgerVersion is the resolved spec.version value the ExecutedVersionActions
                        ledger applies to; a different resolved version resets it. Empty on an
                        unversioned StageSet (where scope: Version is not permitted).
                      type: string
                    message:
                      description: Message carries a human-readable progress or failure
                        detail.
                      type: string
                    name:
                      description: Name of the stage.
                      type: string
                    phase:
                      description: Phase of the stage.
                      enum:
                      - Pending
                      - Applying
                      - Pruning
                      - Verifying
                      - Ready
                      - Failed
                      type: string
                    promotionState:
                      description: |-
                        PromotionState reports where this stage stands against its promotion gate
                        (soak / manual). Absent when the stage has no promotion gate.
                      properties:
                        abortedRevision:
                          description: |-
                            AbortedRevision names the revision a promotion analysis with
                            onFailure=Rollback reverted away from. While it equals the pinned revision
                            the rollout stays reverted and the stage is not re-applied — so a failing
                            revision isn't churned apply→fail→revert each reconcile. Cleared by a new
                            revision or a manual promote.
                          type: string
                        analysisFailures:
                          description: |-
                            AnalysisFailures is the running count of consecutive failing analysis
                            evaluations; it resets to zero on a passing evaluation and trips onFailure
                            once it exceeds failureLimit.
                          format: int32
                          type: integer
                        eventCheck:
                          description: |-
                            EventCheck names the promotion.eventGate check whose pods exceeded their
                            maxEvents, when a Warning-event breach is what blocks the rollout.
                          type: string
                        lastAnalysis:
                          description: |-
                            LastAnalysis records the most recent promotion-analysis evaluation, so an
                            operator sees each check's observed value and verdict.
                          properties:
                            checks:
                              description: Checks reports each check's observed value
                                and verdict.
                              items:
                                description: AnalysisCheckResult is one check's observed
                                  value and verdict.
                                properties:
                                  error:
                                    description: Error describes why the source could
                                      not be read, when applicable.
                                    type: string
                                  name:
                                    description: Name of the check.
                                    type: string
                                  ok:
                                    description: OK is true when the value stayed
                                      within the check's threshold.
                                    type: boolean
                                  value:
                                    description: |-
                                      Value is the observed scalar, as a decimal string. Empty when the source
                                      could not be read.
                                    type: string
                                required:
                                - name
                                type: object
                              type: array
                            passed:
                              description: Passed is true when every check stayed
                                within its threshold.
                              type: boolean
                            time:
                              description: Time the evaluation ran.
                              format: date-time
                              type: string
                          type: object
                        observedEvents:
                          description: |-
                            ObservedEvents is the matching Warning-event total the breaching EventCheck
                            observed.
                          format: int32
                          type: integer
                        observedRestarts:
                          description: ObservedRestarts is the restart total the breaching
                            RestartCheck observed.
                          format: int32
                          type: integer
                        phase:
                          description: Phase is the current promotion phase.
                          type: string
                        restartCheck:
                          description: |-
                            RestartCheck names the promotion.restartChecks entry whose pods exceeded
                            their maxRestarts, when a restart breach is what blocks the rollout.
                          type: string
                        since:
                          description: |-
                            Since is when the current phase began. For Soaking it marks the soak
                            start, so the soak deadline is Since + spec soak.
                          format: date-time
                          type: string
                        soakUntil:
                          description: |-
                            SoakUntil is the instant the soak window closes. It is set while Soaking
                            and carried onto an intervening hold (Blocked) so a transient block during
                            the bake resumes the original soak deadline instead of skipping or
                            restarting the soak when it clears.
                          format: date-time
                          type: string
                      type: object
                    shards:
                      description: Shards is the number of StageInventory shards backing
                        the stage.
                      format: int32
                      type: integer
                  required:
                  - name
                  type: object
                type: array
              version:
                description: |-
                  Version is the currently deployed system version, written only after a
                  fully successful run.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
