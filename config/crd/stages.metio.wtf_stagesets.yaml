---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: stagesets.stages.metio.wtf
spec:
  group: stages.metio.wtf
  names:
    kind: StageSet
    listKind: StageSetList
    plural: stagesets
    singular: stageset
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].message
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          StageSet deploys an ordered, gated list of stages built from
          ExternalArtifact sources.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              StageSetSpec defines an ordered, gated, multi-stage deployment of
              ExternalArtifact contents.
            properties:
              decryption:
                description: |-
                  Decryption decrypts SOPS-encrypted files in every stage's source before
                  the manifests are built, so an encrypted Secret rolls out as plaintext.
                properties:
                  provider:
                    description: Provider is the decryption backend. Only "sops" is
                      supported.
                    enum:
                    - sops
                    type: string
                  secretRef:
                    description: |-
                      SecretRef names a Secret in the StageSet's namespace holding the
                      decryption keys, using the SOPS key conventions: age private keys under
                      data entries suffixed ".agekey", armored PGP private keys under ".asc".
                      The Secret is read under the StageSet's serviceAccountName, so a tenant
                      can only decrypt with material its ServiceAccount can read. Optional: omit
                      for a cloud-KMS-only setup that uses the controller's ambient credentials.
                    properties:
                      name:
                        description: Name of the referent.
                        type: string
                    required:
                    - name
                    type: object
                required:
                - provider
                type: object
              dependsOn:
                description: |-
                  DependsOn lists StageSets that must be Ready (with observed
                  generation) before this one reconciles. Semantics match
                  kustomize-controller.
                items:
                  description: |-
                    NamespacedObjectReference contains enough information to locate the referenced Kubernetes resource object in any
                    namespace.
                  properties:
                    name:
                      description: Name of the referent.
                      type: string
                    namespace:
                      description: Namespace of the referent, when not specified it
                        acts as LocalObjectReference.
                      type: string
                  required:
                  - name
                  type: object
                type: array
              driftDetectionInterval:
                description: |-
                  DriftDetectionInterval, when set, re-asserts the applied state on this
                  (typically shorter) cadence to correct out-of-band drift, independently of
                  the full reconcile Interval. Source changes still reconcile immediately via
                  watches; this only controls how often the controller re-applies the pinned
                  state to heal drift. Leave unset to fold drift correction into Interval.
                type: string
              errorBudget:
                description: |-
                  ErrorBudget freezes new-revision rollouts while a service is out of its SLO
                  error budget — the Google SRE error-budget policy. It reads one scalar
                  (budget remaining, 0..1) from a metric source and holds the rollout while
                  the value is below freezeThreshold, resuming on its own when it recovers.
                  Combined with updateWindows under a logical AND: a rollout proceeds only if
                  every gate allows.
                properties:
                  dryRun:
                    description: |-
                      DryRun records what would freeze (status + metric) without holding the
                      rollout, so an operator can prove a freeze rule fires before it gates.
                    type: boolean
                  freezeThreshold:
                    description: |-
                      FreezeThreshold freezes new-revision rollouts when the remaining budget is
                      strictly below this value. "0" freezes only when the budget is overspent;
                      "0.1" keeps a 10% reserve. A decimal string.
                    type: string
                  interval:
                    description: |-
                      Interval is the re-check cadence while frozen. Defaults to the StageSet's
                      reconcile interval.
                    type: string
                  onSourceError:
                    description: |-
                      OnSourceError chooses what happens when the source is unreachable or
                      returns no usable scalar: Allow (proceed — the default, because blocking a
                      rollout-wide freeze stops every deploy including the hotfix you need during
                      the very outage that took the source down) or Hold (block). Either way the
                      error is loud: a BudgetSourceUnavailable condition, a Warning event, and
                      the metric_source_errors metric.
                    enum:
                    - Allow
                    - Hold
                    type: string
                  resumeThreshold:
                    description: |-
                      ResumeThreshold resumes rollouts only once the remaining budget reaches
                      this value. Set it above freezeThreshold for hysteresis (freeze at 0,
                      resume at 0.05) so a budget hovering at the threshold doesn't flap the
                      freeze. Defaults to freezeThreshold (no hysteresis). A decimal string.
                    type: string
                  source:
                    description: |-
                      Source resolves to the remaining error budget as a scalar (typically a
                      0..1 ratio). The controller carries no SLO math — it reads this number and
                      compares it to the thresholds below.
                    properties:
                      prometheus:
                        description: |-
                          Prometheus runs an instant query that must evaluate to a single scalar.
                          PromQL natively covers Sloth, Pyrra, Grafana, and Nobl9's Prometheus API,
                          so the bulk of SLO installs need no per-tool code. Exactly one of
                          prometheus or webhook must be set.
                        properties:
                          address:
                            description: |-
                              Address is the Prometheus base URL, e.g. http://prometheus.monitoring:9090.
                              In-cluster private addresses are expected and allowed; only loopback,
                              link-local (incl. cloud metadata), multicast, and unspecified addresses are
                              refused, mirroring the http-action SSRF guard.
                            type: string
                          query:
                            description: |-
                              Query is an instant PromQL query that MUST evaluate to a single scalar (a
                              scalar result, or an instant vector with exactly one sample). For an
                              error-budget freeze this is typically the remaining budget as a 0..1 ratio
                              (e.g. Sloth's slo:period_error_budget_remaining:ratio{...}).
                            type: string
                          secretRef:
                            description: |-
                              SecretRef optionally names a Secret in the StageSet's namespace holding a
                              bearer token under the "token" key, sent as Authorization: Bearer on the
                              query. The Secret is read as the StageSet's serviceAccountName, so it must
                              be one that ServiceAccount can get.
                            properties:
                              name:
                                description: Name of the referent.
                                type: string
                            required:
                            - name
                            type: object
                        required:
                        - address
                        - query
                        type: object
                      webhook:
                        description: |-
                          Webhook fetches a JSON document over HTTP and extracts the scalar with a
                          JSONPath expression — the escape hatch for SaaS SLO APIs (Nobl9, Grafana
                          Cloud) that have no Prometheus endpoint. Exactly one of prometheus or
                          webhook must be set.
                        properties:
                          jsonPath:
                            description: |-
                              JSONPath is a kubectl-style JSONPath expression selecting the scalar from
                              the response body, e.g. '{.objectives[0].errorBudgetRemaining}'. It must
                              resolve to exactly one numeric (or numeric-string) value.
                            type: string
                          secretRef:
                            description: |-
                              SecretRef optionally names a Secret in the StageSet's namespace holding a
                              bearer token under the "token" key, sent as Authorization: Bearer. The
                              Secret is read as the StageSet's serviceAccountName, so it must be one
                              that ServiceAccount can get.
                            properties:
                              name:
                                description: Name of the referent.
                                type: string
                            required:
                            - name
                            type: object
                          url:
                            description: |-
                              URL is the endpoint to GET. Public addresses are expected (SaaS APIs);
                              loopback, link-local (incl. cloud metadata), multicast, and unspecified
                              addresses are refused, mirroring the http-action SSRF guard.
                            type: string
                        required:
                        - jsonPath
                        - url
                        type: object
                    type: object
                required:
                - freezeThreshold
                - source
                type: object
              interval:
                description: |-
                  Interval at which to reconcile the StageSet. Optional: when omitted, the
                  controller's --default-interval is used.
                type: string
              kubeConfig:
                description: KubeConfig selects a remote cluster to apply to.
                properties:
                  configMapRef:
                    description: |-
                      ConfigMapRef holds an optional name of a ConfigMap that contains
                      the following keys:

                      - `provider`: the provider to use. One of `aws`, `azure`, `gcp`, or
                         `generic`. Required.
                      - `cluster`: the fully qualified resource name of the Kubernetes
                         cluster in the cloud provider API. Not used by the `generic`
                         provider. Required when one of `address` or `ca.crt` is not set.
                      - `address`: the address of the Kubernetes API server. Required
                         for `generic`. For the other providers, if not specified, the
                         first address in the cluster resource will be used, and if
                         specified, it must match one of the addresses in the cluster
                         resource.
                         If audiences is not set, will be used as the audience for the
                         `generic` provider.
                      - `ca.crt`: the optional PEM-encoded CA certificate for the
                         Kubernetes API server. If not set, the controller will use the
                         CA certificate from the cluster resource.
                      - `audiences`: the optional audiences as a list of
                         line-break-separated strings for the Kubernetes ServiceAccount
                         token. Defaults to the `address` for the `generic` provider, or
                         to specific values for the other providers depending on the
                         provider.
                      -  `serviceAccountName`: the optional name of the Kubernetes
                         ServiceAccount in the same namespace that should be used
                         for authentication. If not specified, the controller
                         ServiceAccount will be used.

                      Mutually exclusive with SecretRef.
                    properties:
                      name:
                        description: Name of the referent.
                        type: string
                    required:
                    - name
                    type: object
                  secretRef:
                    description: |-
                      SecretRef holds an optional name of a secret that contains a key with
                      the kubeconfig file as the value. If no key is set, the key will default
                      to 'value'. Mutually exclusive with ConfigMapRef.
                      It is recommended that the kubeconfig is self-contained, and the secret
                      is regularly updated if credentials such as a cloud-access-token expire.
                      Cloud specific `cmd-path` auth helpers will not function without adding
                      binaries and credentials to the Pod that is responsible for reconciling
                      Kubernetes resources. Supported only for the generic provider.
                    properties:
                      key:
                        description: Key in the Secret, when not specified an implementation-specific
                          default key is used.
                        type: string
                      name:
                        description: Name of the Secret.
                        type: string
                    required:
                    - name
                    type: object
                type: object
                x-kubernetes-validations:
                - message: exactly one of spec.kubeConfig.configMapRef or spec.kubeConfig.secretRef
                    must be specified
                  rule: has(self.configMapRef) || has(self.secretRef)
                - message: exactly one of spec.kubeConfig.configMapRef or spec.kubeConfig.secretRef
                    must be specified
                  rule: '!has(self.configMapRef) || !has(self.secretRef)'
              migrations:
                description: |-
                  Migrations are version-gated action ladders run when crossing a
                  version boundary, anchored before a named stage's pre-actions.
                  Requires spec.version. Mutually exclusive with MigrationsSourceRef.
                items:
                  description: Migration is a version-gated action ladder.
                  properties:
                    actions:
                      description: Actions run in list order when the boundary is
                        crossed.
                      items:
                        description: |-
                          Action is one typed step. Exactly one of Patch, HTTP, Wait, Job, Delete, or
                          Apply must be set — enforced by the validating admission webhook (and a
                          reconciler fallback), not a CRD CEL rule, so spec.stages and the action lists
                          stay unbounded (CEL cost is multiplied by enclosing array sizes).
                        properties:
                          apply:
                            description: |-
                              Apply applies manifests from an ExternalArtifact path as a transient
                              action step — for resources that should live only across a rollout
                              (e.g. a maintenance-page pod), not as steady-state stage members.
                            properties:
                              path:
                                description: Path inside the artifact to build. Defaults
                                  to "./".
                                type: string
                              sourceRef:
                                description: |-
                                  SourceRef references the ExternalArtifact (directly or via a producer)
                                  holding the manifests to apply.
                                properties:
                                  apiVersion:
                                    description: |-
                                      APIVersion of the referent. Defaults to
                                      source.toolkit.fluxcd.io/v1. Required when Kind is set to a
                                      producer kind.
                                    type: string
                                  kind:
                                    description: |-
                                      Kind of the referent. Defaults to ExternalArtifact; any other kind
                                      is treated as a producer and resolved via the back-pointer index.
                                    type: string
                                  name:
                                    description: Name of the referent.
                                    type: string
                                  namespace:
                                    description: |-
                                      Namespace of the referent; defaults to the StageSet's namespace.
                                      Cross-namespace references are gated by --no-cross-namespace-refs.
                                    type: string
                                required:
                                - name
                                type: object
                              wait:
                                description: |-
                                  Wait blocks until the applied objects report Ready (kstatus), bounded
                                  by the action Timeout — so a following patch action can repoint traffic
                                  only once the resource is serving.
                                type: boolean
                            required:
                            - sourceRef
                            type: object
                          completionAnchor:
                            description: |-
                              CompletionAnchor, valid only on a scope: Lifetime action, names an
                              in-cluster object whose existence witnesses the action's effect. With no
                              anchor (the default) the effect is presumed external and the completion is
                              retained across a StageSet delete+recreate. With an anchor, the completion
                              is valid only while the named object exists with the UID recorded at
                              completion — a delete+recreate under the same name is a fresh object (new
                              UID) that re-runs the action against the empty state. The anchor must exist
                              when the action completes so its UID can be recorded, so an anchor the stage
                              itself applies belongs on a post action (pre runs before the apply).
                            properties:
                              apiVersion:
                                description: APIVersion of the witness object, e.g.
                                  "v1" or "postgresql.cnpg.io/v1".
                                type: string
                              kind:
                                description: Kind of the witness object, e.g. "PersistentVolumeClaim".
                                type: string
                              name:
                                description: Name of the witness object in the StageSet's
                                  namespace.
                                type: string
                            required:
                            - apiVersion
                            - kind
                            - name
                            type: object
                          delete:
                            description: |-
                              Delete removes an existing in-cluster object — primarily for
                              migrations that recreate immutable objects. A missing target is
                              success (idempotent).
                            properties:
                              cascade:
                                description: |-
                                  Cascade controls what happens to the target's dependents, mirroring
                                  kubectl's --cascade. Background (the default) deletes the target and
                                  garbage-collects dependents asynchronously; Foreground deletes dependents
                                  before the target; Orphan deletes the target but leaves dependents running
                                  (their controller ownerReferences are removed). Orphan is the building block
                                  for recreating an object whose immutable fields changed without downtime:
                                  orphan-delete it, then re-apply the new spec, which adopts the still-running
                                  dependents by selector.
                                enum:
                                - Background
                                - Foreground
                                - Orphan
                                type: string
                              target:
                                description: Target object to delete.
                                properties:
                                  apiVersion:
                                    description: API version of the referent, if not
                                      specified the Kubernetes preferred version will
                                      be used.
                                    type: string
                                  kind:
                                    description: Kind of the referent.
                                    type: string
                                  name:
                                    description: Name of the referent.
                                    type: string
                                  namespace:
                                    description: Namespace of the referent, when not
                                      specified it acts as LocalObjectReference.
                                    type: string
                                required:
                                - kind
                                - name
                                type: object
                            required:
                            - target
                            type: object
                          http:
                            description: HTTP calls an endpoint; gated by --allowed-action-hosts.
                            properties:
                              body:
                                description: Body inline.
                                type: string
                              bodyFrom:
                                description: BodyFrom reads the body from a Secret
                                  key.
                                properties:
                                  key:
                                    description: Key in the Secret, when not specified
                                      an implementation-specific default key is used.
                                    type: string
                                  name:
                                    description: Name of the Secret.
                                    type: string
                                required:
                                - name
                                type: object
                              expectedStatus:
                                description: ExpectedStatus codes; defaults to any
                                  2xx.
                                items:
                                  format: int32
                                  maximum: 599
                                  minimum: 100
                                  type: integer
                                type: array
                              headersFrom:
                                description: HeadersFrom reads headers from Secret
                                  keys.
                                items:
                                  description: |-
                                    SecretKeyReference contains enough information to locate the referenced Kubernetes Secret object in the same
                                    namespace. Optionally a key can be specified.
                                    Use this type instead of core/v1 SecretKeySelector when the Key is optional and the Optional field is not
                                    applicable.
                                  properties:
                                    key:
                                      description: Key in the Secret, when not specified
                                        an implementation-specific default key is
                                        used.
                                      type: string
                                    name:
                                      description: Name of the Secret.
                                      type: string
                                  required:
                                  - name
                                  type: object
                                type: array
                              method:
                                description: Method defaults to POST.
                                enum:
                                - GET
                                - POST
                                - PUT
                                - PATCH
                                - DELETE
                                - HEAD
                                type: string
                              url:
                                description: URL to call; validated against --allowed-action-hosts.
                                type: string
                            required:
                            - url
                            type: object
                          job:
                            description: Job renders and awaits Jobs from an ExternalArtifact
                              path.
                            properties:
                              path:
                                description: Path inside the artifact. Defaults to
                                  "./".
                                type: string
                              sourceRef:
                                description: SourceRef references the ExternalArtifact
                                  containing the Jobs.
                                properties:
                                  apiVersion:
                                    description: |-
                                      APIVersion of the referent. Defaults to
                                      source.toolkit.fluxcd.io/v1. Required when Kind is set to a
                                      producer kind.
                                    type: string
                                  kind:
                                    description: |-
                                      Kind of the referent. Defaults to ExternalArtifact; any other kind
                                      is treated as a producer and resolved via the back-pointer index.
                                    type: string
                                  name:
                                    description: Name of the referent.
                                    type: string
                                  namespace:
                                    description: |-
                                      Namespace of the referent; defaults to the StageSet's namespace.
                                      Cross-namespace references are gated by --no-cross-namespace-refs.
                                    type: string
                                required:
                                - name
                                type: object
                            required:
                            - sourceRef
                            type: object
                          name:
                            description: Name of the action, for status and Events.
                            type: string
                          patch:
                            description: Patch modifies an existing in-cluster object.
                            properties:
                              patch:
                                description: Patch content.
                                type: string
                              target:
                                description: |-
                                  Target selects what to patch: a single named object, or every object of a
                                  kind matching a label selector.
                                properties:
                                  apiVersion:
                                    description: APIVersion of the object(s); empty
                                      uses the API server's preferred version.
                                    type: string
                                  kind:
                                    description: Kind of the object(s).
                                    type: string
                                  name:
                                    description: Name of a single object to patch.
                                      Mutually exclusive with selector.
                                    type: string
                                  namespace:
                                    description: Namespace of the object(s); defaults
                                      to the StageSet's namespace.
                                    type: string
                                  selector:
                                    description: |-
                                      Selector patches every object of Kind in the namespace whose labels match.
                                      Mutually exclusive with name; an empty selector is rejected. Use it to patch
                                      a set in one step — e.g. every PVC of a StatefulSet to grow its storage
                                      request.
                                    properties:
                                      matchExpressions:
                                        description: matchExpressions is a list of
                                          label selector requirements. The requirements
                                          are ANDed.
                                        items:
                                          description: |-
                                            A label selector requirement is a selector that contains values, a key, and an operator that
                                            relates the key and values.
                                          properties:
                                            key:
                                              description: key is the label key that
                                                the selector applies to.
                                              type: string
                                            operator:
                                              description: |-
                                                operator represents a key's relationship to a set of values.
                                                Valid operators are In, NotIn, Exists and DoesNotExist.
                                              type: string
                                            values:
                                              description: |-
                                                values is an array of string values. If the operator is In or NotIn,
                                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                                the values array must be empty. This array is replaced during a strategic
                                                merge patch.
                                              items:
                                                type: string
                                              type: array
                                              x-kubernetes-list-type: atomic
                                          required:
                                          - key
                                          - operator
                                          type: object
                                        type: array
                                        x-kubernetes-list-type: atomic
                                      matchLabels:
                                        additionalProperties:
                                          type: string
                                        description: |-
                                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                                        type: object
                                    type: object
                                    x-kubernetes-map-type: atomic
                                required:
                                - kind
                                type: object
                              type:
                                description: 'Type of the patch: merge or json6902.
                                  Defaults to merge.'
                                enum:
                                - merge
                                - json6902
                                type: string
                            required:
                            - patch
                            - target
                            type: object
                          retries:
                            description: Retries before the action is considered failed.
                            format: int32
                            maximum: 100
                            minimum: 0
                            type: integer
                          scope:
                            description: |-
                              Scope selects how often this action runs — which ledger gates it. Valid
                              only on a stage's pre/post actions; rejected on onFailure, onRollback, and
                              migration actions, which have their own (or no) ledger. Unset means
                              Revision (once per pinned revision, unchanged). Version keys completion to
                              the resolved spec.version value instead, so revision churn at a fixed
                              version stops re-running upgrade choreography; it requires spec.version.

                              No CRD default: Action is a shared type, and a default would stamp Scope
                              onto onFailure, onRollback, and migration actions too — where scope is
                              rejected — making a defaulted value indistinguishable from an authored one
                              there. EffectiveScope supplies the Revision default in code, at the pre/post
                              sites where it is meaningful.
                            enum:
                            - Revision
                            - Version
                            - Lifetime
                            type: string
                          timeout:
                            description: Timeout for the action.
                            type: string
                          wait:
                            description: Wait blocks for a duration or until a CEL
                              expression holds.
                            properties:
                              duration:
                                description: Duration of a fixed wait.
                                type: string
                              expr:
                                description: Expr is a CEL expression over the target's
                                  state.
                                type: string
                              target:
                                description: Target object for Expr.
                                properties:
                                  apiVersion:
                                    description: API version of the referent, if not
                                      specified the Kubernetes preferred version will
                                      be used.
                                    type: string
                                  kind:
                                    description: Kind of the referent.
                                    type: string
                                  name:
                                    description: Name of the referent.
                                    type: string
                                  namespace:
                                    description: Namespace of the referent, when not
                                      specified it acts as LocalObjectReference.
                                    type: string
                                required:
                                - kind
                                - name
                                type: object
                              timeout:
                                description: Timeout for expression-based waits.
                                type: string
                            type: object
                        required:
                        - name
                        type: object
                      type: array
                    from:
                      description: |-
                        From optionally constrains the current version it applies from. Unlike
                        To, this is a semver *constraint* (e.g. ">=1.0.0, <2.0.0" or "1.x"),
                        matched against the currently deployed version. Omit to fire on every
                        crossing up to To.
                      type: string
                    name:
                      description: Name of the migration, for the idempotency ledger
                        and Events.
                      type: string
                    stage:
                      description: |-
                        Stage anchors when the migration runs: before the pre-actions of the
                        stage whose MigrationAnchor (preferred) or Name equals this value. Omit
                        to anchor before the first stage. A value matching no stage in a
                        consuming StageSet fails closed (reason MigrationStageNotFound) rather
                        than silently skipping — important for a ladder shared across StageSets
                        whose stages may be named differently.
                      type: string
                    to:
                      description: |-
                        To is the exact version boundary this migration crosses up to (a
                        concrete semver, not a range).
                      type: string
                  required:
                  - name
                  - to
                  type: object
                type: array
              migrationsSourceRef:
                description: |-
                  MigrationsSourceRef sources the migration ladder from a Flux source's
                  artifact instead of inlining it, so one ladder can be authored once and
                  shared across many StageSets. The artifact holds a serialized
                  []Migration. Mutually exclusive with Migrations; requires spec.version.
                properties:
                  path:
                    description: |-
                      Path inside the artifact selecting the migrations file or directory.
                      Defaults to the artifact root.
                    type: string
                  sourceRef:
                    description: |-
                      SourceRef references the artifact-producing source (an ExternalArtifact,
                      or a producer kind resolved via the back-pointer index — the same
                      reference shape a stage uses). Resolved in the StageSet's namespace;
                      cross-namespace references are gated by --no-cross-namespace-refs.
                    properties:
                      apiVersion:
                        description: |-
                          APIVersion of the referent. Defaults to
