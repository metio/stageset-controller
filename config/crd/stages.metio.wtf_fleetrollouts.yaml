---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: fleetrollouts.stages.metio.wtf
spec:
  group: stages.metio.wtf
  names:
    kind: FleetRollout
    listKind: FleetRolloutList
    plural: fleetrollouts
    shortNames:
    - fleet
    singular: fleetrollout
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetVersion
      name: Target
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.currentWave
      name: Wave
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          FleetRollout progressively rolls one target version across a fleet of StageSets
          in ordered waves, soaking and health-checking between waves and halting the
          whole fleet on regression. It is cluster-scoped because a fleet inherently spans
          namespaces; it approves the version its members' own sources already offer,
          pacing adoption rather than pushing versions.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              FleetRolloutSpec declares a progressive rollout of one target version across a
              selected set of StageSets, in ordered waves.
            properties:
              namespaceSelector:
                description: |-
                  NamespaceSelector bounds which namespaces the fleet spans. Omit to consider
                  StageSets in every namespace.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              onRegression:
                default: Halt
                description: |-
                  OnRegression is what to do when a wave's health gate fails or a member
                  regresses: Halt (default) stops approving further waves; Rollback also
                  stamps the pre-rollout version back onto the affected wave, unwinding it via
                  each member's down migrations where they exist.
                enum:
                - Halt
                - Rollback
                type: string
              selector:
                description: |-
                  Selector chooses the StageSets that participate in this rollout. A member
                  must also set spec.version.approvalMode: Always so it holds each advance for
                  the fleet to approve.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              targetVersion:
                description: |-
                  TargetVersion is the version this rollout approves across the fleet. The
                  controller stamps it as each wave opens; a member advances to it only when
                  its own source already offers that version, so the rollout paces adoption
                  rather than pushing versions — it composes with GitOps.
                type: string
              waves:
                description: |-
                  Waves are the ordered groups the rollout opens one at a time. A StageSet
                  that matches Selector but no wave is reported and never approved — no silent
                  exclusion.
                items:
                  description: FleetWave is one ordered group of the rollout.
                  properties:
                    name:
                      description: Name identifies the wave in status and events.
                      type: string
                    selector:
                      description: |-
                        Selector partitions the fleet: members matching it belong to this wave.
                        Waves should not overlap; a member in two waves is reported as ambiguous.
                      properties:
                        matchExpressions:
                          description: matchExpressions is a list of label selector
                            requirements. The requirements are ANDed.
                          items:
                            description: |-
                              A label selector requirement is a selector that contains values, a key, and an operator that
                              relates the key and values.
                            properties:
                              key:
                                description: key is the label key that the selector
                                  applies to.
                                type: string
                              operator:
                                description: |-
                                  operator represents a key's relationship to a set of values.
                                  Valid operators are In, NotIn, Exists and DoesNotExist.
                                type: string
                              values:
                                description: |-
                                  values is an array of string values. If the operator is In or NotIn,
                                  the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                  the values array must be empty. This array is replaced during a strategic
                                  merge patch.
                                items:
                                  type: string
                                type: array
                                x-kubernetes-list-type: atomic
                            required:
                            - key
                            - operator
                            type: object
                          type: array
                          x-kubernetes-list-type: atomic
                        matchLabels:
                          additionalProperties:
                            type: string
                          description: |-
                            matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                            map is equivalent to an element of matchExpressions, whose key field is "key", the
                            operator is "In", and the values array contains only "value". The requirements are ANDed.
                          type: object
                      type: object
                      x-kubernetes-map-type: atomic
                    soak:
                      description: |-
                        Soak holds the wave after it settles (every member at the target version and
                        Ready) before the health gate runs and the next wave opens.
                      type: string
                  required:
                  - name
                  - selector
                  type: object
                minItems: 1
                type: array
            required:
            - selector
            - targetVersion
            - waves
            type: object
          status:
            description: FleetRolloutStatus reports rollout progress.
            properties:
              conditions:
                description: |-
                  Conditions carries the Ready condition (with ObservedGeneration) for the
                  rollout as a whole.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentWave:
                description: |-
                  CurrentWave is the wave currently open, empty before the first opens or
                  after completion.
                type: string
              observedGeneration:
                description: ObservedGeneration is the spec generation this status
                  reflects.
                format: int64
                type: integer
              phase:
                description: Phase is the overall rollout state.
                type: string
              waves:
                description: Waves reports per-wave progress in spec order.
                items:
                  description: FleetWaveStatus is one wave's observed progress.
                  properties:
                    atTarget:
                      description: AtTarget counts members whose status.version equals
                        the target version.
                      format: int32
                      type: integer
                    health:
                      description: Health is the last verdict of the wave's health
                        gate.
                      enum:
                      - Passing
                      - Failing
                      - Unknown
                      type: string
                    name:
                      description: Name of the wave.
                      type: string
                    ready:
                      description: |-
                        Ready counts members that are Ready at their observed generation with no
                        revision still held back.
                      format: int32
                      type: integer
                    settled:
                      description: Settled is true once every member is both at the
                        target version and Ready.
                      type: boolean
                    soakUntil:
                      description: SoakUntil is when the wave's soak elapses, set
                        once it settles.
                      format: date-time
                      type: string
                    total:
                      description: Total members assigned to this wave.
                      format: int32
                      type: integer
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
