---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: fleetrollouts.stages.metio.wtf
spec:
  group: stages.metio.wtf
  names:
    kind: FleetRollout
    listKind: FleetRolloutList
    plural: fleetrollouts
    shortNames:
    - fleet
    singular: fleetrollout
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetVersion
      name: Target
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.currentWave
      name: Wave
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          FleetRollout progressively rolls one target version across a fleet of StageSets
          in ordered waves, soaking and health-checking between waves and halting the
          whole fleet on regression. It is cluster-scoped because a fleet inherently spans
          namespaces; it approves the version its members' own sources already offer,
          pacing adoption rather than pushing versions.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              FleetRolloutSpec declares a progressive rollout of one target version across a
              selected set of StageSets, in ordered waves.
            properties:
              namespaceSelector:
                description: |-
                  NamespaceSelector bounds which namespaces the fleet spans. Omit to consider
                  StageSets in every namespace.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              onRegression:
                default: Halt
                description: |-
                  OnRegression is what to do when a wave's health gate fails or a member
                  regresses: Halt (default) stops approving further waves; Rollback also
                  directs the affected wave's members back to PreviousVersion, unwinding them
                  via each member's down migrations where they exist.
                enum:
                - Halt
                - Rollback
                type: string
              previousVersion:
                description: |-
                  PreviousVersion is the version a Rollback directs regressed members back to —
                  the version the fleet is rolling away from. Required when onRegression is
                  Rollback. A member only actually reverts if it permits downgrades
                  (spec.version.allowDowngrade) and the crossed migrations declare down actions;
                  otherwise it refuses, and the fleet stays halted.
                type: string
              selector:
                description: |-
                  Selector chooses the StageSets that participate in this rollout. A member
                  must also set spec.version.approvalMode: Always so it holds each advance for
                  the fleet to approve.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              targetVersion:
                description: |-
                  TargetVersion optionally pins the version this rollout approves. Omit it —
                  the recommended default — and the fleet derives each member's target from
                  its own held advance (status.pendingVersion), pacing whatever version the
                  members' sources offer without restating it here; the FleetRollout becomes a
                  standing wave policy that paces every future advance. Set it only to pin a
                  specific, bounded rollout of exactly that version.
                type: string
              waves:
                description: |-
                  Waves are the ordered groups the rollout opens one at a time. A StageSet
                  that matches Selector but no wave is reported and never approved — no silent
                  exclusion.
                items:
                  description: FleetWave is one ordered group of the rollout.
                  properties:
                    gate:
                      description: |-
                        Gate is a metric the wave must satisfy after it settles and soaks before the
                        next wave opens. A scalar outside the threshold halts the whole rollout.
                      properties:
                        source:
                          description: Source is the metric to query — a Prometheus
                            instant query or a webhook.
                          properties:
                            prometheus:
                              description: |-
                                Prometheus runs an instant query that must evaluate to a single scalar.
                                PromQL natively covers Sloth, Pyrra, Grafana, and Nobl9's Prometheus API,
                                so the bulk of SLO installs need no per-tool code. Exactly one of
                                prometheus or webhook must be set.
                              properties:
                                address:
                                  description: |-
                                    Address is the Prometheus base URL, e.g. http://prometheus.monitoring:9090.
                                    In-cluster private addresses are expected and allowed; only loopback,
                                    link-local (incl. cloud metadata), multicast, and unspecified addresses are
                                    refused, mirroring the http-action SSRF guard.
                                  type: string
                                query:
                                  description: |-
                                    Query is an instant PromQL query that MUST evaluate to a single scalar (a
                                    scalar result, or an instant vector with exactly one sample). For an
                                    error-budget freeze this is typically the remaining budget as a 0..1 ratio
                                    (e.g. Sloth's slo:period_error_budget_remaining:ratio{...}).
                                  type: string
                                secretRef:
                                  description: |-
                                    SecretRef optionally names a Secret in the StageSet's namespace holding a
                                    bearer token under the "token" key, sent as Authorization: Bearer on the
                                    query. The Secret is read as the StageSet's serviceAccountName, so it must
                                    be one that ServiceAccount can get.
                                  properties:
                                    name:
                                      description: Name of the referent.
                                      type: string
                                  required:
                                  - name
                                  type: object
                              required:
                              - address
                              - query
                              type: object
                            webhook:
                              description: |-
                                Webhook fetches a JSON document over HTTP and extracts the scalar with a
                                JSONPath expression — the escape hatch for SaaS SLO APIs (Nobl9, Grafana
                                Cloud) that have no Prometheus endpoint. Exactly one of prometheus or
                                webhook must be set.
                              properties:
                                jsonPath:
                                  description: |-
                                    JSONPath is a kubectl-style JSONPath expression selecting the scalar from
                                    the response body, e.g. '{.objectives[0].errorBudgetRemaining}'. It must
                                    resolve to exactly one numeric (or numeric-string) value.
                                  type: string
                                secretRef:
                                  description: |-
                                    SecretRef optionally names a Secret in the StageSet's namespace holding a
                                    bearer token under the "token" key, sent as Authorization: Bearer. The
                                    Secret is read as the StageSet's serviceAccountName, so it must be one
                                    that ServiceAccount can get.
                                  properties:
                                    name:
                                      description: Name of the referent.
                                      type: string
                                  required:
                                  - name
                                  type: object
                                url:
                                  description: |-
                                    URL is the endpoint to GET. Public addresses are expected (SaaS APIs);
                                    loopback, link-local (incl. cloud metadata), multicast, and unspecified
                                    addresses are refused, mirroring the http-action SSRF guard.
                                  type: string
                              required:
                              - jsonPath
                              - url
                              type: object
                          type: object
                        threshold:
                          description: |-
                            Threshold the queried scalar must satisfy for the wave to pass. A scalar
                            outside it halts the rollout.
                          properties:
                            max:
                              description: Max, when set, requires the scalar to be
                                <= this value.
                              type: string
                            min:
                              description: Min, when set, requires the scalar to be
                                >= this value.
                              type: string
                          type: object
                      required:
                      - source
                      - threshold
                      type: object
                    name:
                      description: Name identifies the wave in status and events.
                      type: string
                    selector:
                      description: |-
                        Selector partitions the fleet: members matching it belong to this wave.
                        Waves should not overlap; a member in two waves is reported as ambiguous.
                      properties:
                        matchExpressions:
                          description: matchExpressions is a list of label selector
                            requirements. The requirements are ANDed.
                          items:
                            description: |-
                              A label selector requirement is a selector that contains values, a key, and an operator that
                              relates the key and values.
                            properties:
                              key:
                                description: key is the label key that the selector
                                  applies to.
                                type: string
                              operator:
                                description: |-
                                  operator represents a key's relationship to a set of values.
                                  Valid operators are In, NotIn, Exists and DoesNotExist.
                                type: string
                              values:
                                description: |-
                                  values is an array of string values. If the operator is In or NotIn,
                                  the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                  the values array must be empty. This array is replaced during a strategic
                                  merge patch.
                                items:
                                  type: string
                                type: array
                                x-kubernetes-list-type: atomic
                            required:
                            - key
                            - operator
                            type: object
                          type: array
                          x-kubernetes-list-type: atomic
                        matchLabels:
                          additionalProperties:
                            type: string
                          description: |-
                            matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                            map is equivalent to an element of matchExpressions, whose key field is "key", the
                            operator is "In", and the values array contains only "value". The requirements are ANDed.
                          type: object
                      type: object
                      x-kubernetes-map-type: atomic
                    soak:
                      description: |-
                        Soak holds the wave after it settles (every member at the target version and
                        Ready) before the health gate runs and the next wave opens.
                      type: string
                  required:
                  - name
                  - selector
                  type: object
                minItems: 1
                type: array
            required:
            - selector
            - waves
            type: object
            x-kubernetes-validations:
            - message: previousVersion is required when onRegression is Rollback
              rule: self.onRegression != 'Rollback' || (has(self.previousVersion)
                && size(self.previousVersion) > 0)
          status:
            description: FleetRolloutStatus reports rollout progress.
            properties:
              conditions:
                description: |-
                  Conditions carries the Ready condition (with ObservedGeneration) for the
                  rollout as a whole.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentWave:
                description: |-
                  CurrentWave is the wave currently open, empty before the first opens or
                  after completion.
                type: string
              observedGeneration:
                description: ObservedGeneration is the spec generation this status
                  reflects.
                format: int64
                type: integer
              phase:
                description: Phase is the overall rollout state.
                type: string
              waves:
                description: Waves reports per-wave progress in spec order.
                items:
                  description: FleetWaveStatus is one wave's observed progress.
                  properties:
                    atTarget:
                      description: AtTarget counts members whose status.version equals
                        the target version.
                      format: int32
                      type: integer
                    health:
                      description: Health is the last verdict of the wave's health
                        gate.
                      enum:
                      - Passing
                      - Failing
                      - Unknown
                      type: string
                    name:
                      description: Name of the wave.
                      type: string
                    ready:
                      description: |-
                        Ready counts members that are Ready at their observed generation with no
                        revision still held back.
                      format: int32
                      type: integer
                    settled:
                      description: Settled is true once every member is both at the
                        target version and Ready.
                      type: boolean
                    soakUntil:
                      description: SoakUntil is when the wave's soak elapses, set
                        once it settles.
                      format: date-time
                      type: string
                    total:
                      description: Total members assigned to this wave.
                      format: int32
                      type: integer
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
