---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-stages-metio-wtf-v1-stageset
  failurePolicy: Fail
  name: vstageset.stages.metio.wtf
  rules:
  - apiGroups:
    - stages.metio.wtf
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - stagesets
  sideEffects: None
