version = 1
SPDX-PackageName = "stageset-controller"
SPDX-PackageSupplier = "Sebastian Hoß <seb@xn--ho-hia.de>"
SPDX-PackageDownloadLocation = "https://github.com/metio/stageset-controller"

[[annotations]]
path = ["go.mod", "go.sum", ".gitignore", ".gitmodules", "renovate.json", "docs/**", "config/**", "LICENSES/**", "skills/**", ".claude-plugin/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "The stageset-controller Authors"
SPDX-License-Identifier = "0BSD"

# flake.lock is nix-generated JSON; it pins the toolchain both CI and local
# shells resolve from flake.nix.
[[annotations]]
path = "flake.lock"
precedence = "override"
SPDX-FileCopyrightText = "The stageset-controller Authors"
SPDX-License-Identifier = "0BSD"
