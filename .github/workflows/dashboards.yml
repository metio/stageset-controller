# Publishes the StageSet controller Grafana dashboard(s) as a single-layer,
# multi-arch OCI image (ghcr.io/metio/stageset-controller-dashboard), consumable as
# a Flux OCIRepository source or an image-volume mount — the same shape as the JOI
# library images. The StageSet controller is not a Jsonnet renderer, so the
# dashboard is rendered through JaaS (the two projects are intentionally tightly
# coupled). Every dashboard is rendered against grafonnet first, so a grafonnet API
# break or a bad dashboard fails before anything is published.
name: Dashboards
on:
  pull_request:
    branches: [main]
    paths:
      - dashboards/**
      - .github/workflows/dashboards.yml
  push:
    branches: [main]
    paths:
      - dashboards/**
      - .github/workflows/dashboards.yml
  workflow_dispatch:
permissions:
  contents: read
env:
  IMAGE: ghcr.io/metio/stageset-controller-dashboard
jobs:
  validate:
    name: Render dashboards against grafonnet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - name: Vendor grafonnet and render every dashboard
        # Renders each dashboard through go-jsonnet with grafonnet on the JPATH,
        # exactly as JaaS renders it. Pinned to grafonnet@main so an upstream API
        # break surfaces here as a wanted signal rather than at a user's cluster.
        # jb + jsonnet come from the flake devShell.
        run: |
          # The $vars expand inside the devShell's bash, not in this script.
          # shellcheck disable=SC2016
          nix develop --command bash -c '
            set -euo pipefail
            tmp="$(mktemp -d)"
            ( cd "$tmp" \
              && jb init >/dev/null \
              && jb install github.com/grafana/grafonnet/gen/grafonnet-latest@main >/dev/null )
            for f in dashboards/*.jsonnet; do
              echo "rendering $f"
              jsonnet -J "$tmp/vendor" --tla-str datasource=prometheus "$f" \
                | jq -e ".title and (.panels | length > 0)" >/dev/null
            done
            echo "all dashboards render to valid Grafana JSON"
          '

  publish:
    name: Build and push the dashboard image
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write # push the image to ghcr.io
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - id: date
        run: echo "date=$(date +'%Y.%-m.%-d')" >> "$GITHUB_OUTPUT"
      - name: Build locally and assert a single layer
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./dashboards
          file: ./dashboards/Containerfile
          load: true
          push: false
          provenance: false
          sbom: false
          tags: stageset-controller-dashboard-verify:latest
      - name: Assert exactly one layer
        # Single layer is the contract that lets the image serve as both an
        # image-volume mount and a Flux OCIRepository source.
        run: |
          n=$(docker image inspect stageset-controller-dashboard-verify:latest --format '{{ len .RootFS.Layers }}')
          [ "$n" = "1" ] || { echo "::error::dashboard image has $n layers, expected 1"; exit 1; }
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: push
        name: Build and push (:latest + dated calver tag)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./dashboards
          file: ./dashboards/Containerfile
          push: true
          # Arch-independent Jsonnet text, but a multi-arch index lets any node
          # arch pull the image as an OCIRepository source or image volume — the
          # same arch set every metio image ships.
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/ppc64le,linux/riscv64,linux/s390x
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.date.outputs.date }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
      - name: Sign
        run: nix develop --command cosign sign --yes "${{ env.IMAGE }}@${{ steps.push.outputs.digest }}"
