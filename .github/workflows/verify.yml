name: Verify
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  discover-envtest:
    name: Discover the newest envtest-supported Kubernetes versions
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.versions.outputs.k8s }}
    steps:
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - id: versions
        # Newest 4 Kubernetes minors (latest patch each) that envtest publishes
        # apiserver+etcd binaries for. Mirrors the kind-smoke discover step but is
        # sourced from `setup-envtest list` — envtest ships its own version set
        # (a superset of kindest/node's), and `setup-envtest use` needs a version
        # it actually has binaries for. Discovered at runtime so a new release is
        # tested automatically; if envtest can't run a brand-new minor, that
        # surfaces as a failure — the signal, not silent staleness.
        run: |
          set -uo pipefail
          k8s=$(go run sigs.k8s.io/controller-runtime/tools/setup-envtest@latest list 2>/dev/null \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' \
            | awk -F. '{print $1"."$2" "$0}' | sort -k1,1V -k2,2V \
            | awk '{l[$1]=$2} END{for(m in l)print l[m]}' | sort -V | tail -4 \
            | jq -R . | jq -cs . 2>/dev/null || echo '[]')
          [ "$(jq 'length' <<<"$k8s" 2>/dev/null || echo 0)" -gt 0 ] || k8s='["1.33.0"]'
          echo "k8s=$k8s" >> "$GITHUB_OUTPUT"
          echo "k8s=$k8s"

  test:
    needs: discover-envtest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s: ${{ fromJson(needs.discover-envtest.outputs.versions) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - name: Set up envtest assets (Kubernetes ${{ matrix.k8s }})
        # Installs the kube-apiserver + etcd bundle so the envtest-backed suite
        # runs in CI; without KUBEBUILDER_ASSETS those tests skip.
        run: |
          assets=$(go run sigs.k8s.io/controller-runtime/tools/setup-envtest@latest use ${{ matrix.k8s }} -p path)
          echo "KUBEBUILDER_ASSETS=$assets" >> "$GITHUB_ENV"
      - run: go test -v -race -shuffle=on -coverprofile=cover.out ./...
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...
      - run: go run github.com/securego/gosec/v2/cmd/gosec@latest ./...
      - name: gofumpt formatting
        run: |
          unformatted="$(go run mvdan.cc/gofumpt@latest -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofumpt-formatted:"
            echo "$unformatted"
            exit 1
          fi
  vulnerabilities:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      # Hard gate: a reachable-from-code advisory blocks merge. Resolution is
      # usually a bump of the `toolchain` directive in go.mod (stdlib advisories)
      # or `go get -u` (deps).
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go run github.com/arch-go/arch-go@latest
  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6
  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: pipx install yamllint && yamllint .
  github-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
        with:
          globs: "**/*.md"
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1
  prose:
    # Vale prose lint against the shared metio/vale-config style; .vale.ini pulls
    # the published package. Fails on error-level findings (naming/branding);
    # inclusive-language findings are warning-level and only annotate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: vale-cli/vale-action@85f9f7f2c5f449ac0ae5b66662961bae3f77ca6a # 2.1.2 # renovate: pin to a SHA
        with:
          files: docs/content
          fail_on_error: true
  docs-lint:
    # Build the site and lint the rendered HTML (htmltest: dead internal links,
    # missing alt text, broken anchors) plus the theme CSS (biome). Mirrors the
    # tools pre-staged in dev/Containerfile. Versions are kept in lockstep with
    # that Containerfile so local and CI runs agree.
    runs-on: ubuntu-latest
    env:
      # renovate: datasource=github-releases depName=wjdp/htmltest
      HTMLTEST_VERSION: 0.17.0
      # renovate: datasource=github-releases depName=biomejs/biome extractVersion=^@biomejs/biome@(?<version>.+)$
      BIOME_VERSION: 2.5.0
      # renovate: datasource=github-releases depName=dadav/helm-schema
      GO_HELM_SCHEMA_VERSION: 0.23.4
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          submodules: recursive
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: latest
          extended: true
      - name: Install helm-schema
        # gen-docs-data.sh generates each chart's values.schema.json on the fly
        # from values.yaml (the committed schema + its drift gate were removed),
        # so the docs build needs helm-schema on PATH. Version in lockstep with
        # dev/Containerfile.
        run: curl -fsSL "https://github.com/dadav/helm-schema/releases/download/${GO_HELM_SCHEMA_VERSION}/helm-schema_${GO_HELM_SCHEMA_VERSION}_Linux_x86_64.tar.gz" | tar -xz -C /usr/local/bin helm-schema
      - name: Generate docs data (flags + chart values)
        run: hack/gen-docs-data.sh
      - name: Build Website
        run: hugo --minify --source docs
      - name: Lint rendered HTML (htmltest)
        run: go run "github.com/wjdp/htmltest@v${HTMLTEST_VERSION}"
      - name: Lint theme CSS (biome)
        run: |
          curl -fsSL -o "${RUNNER_TEMP}/biome" "https://github.com/biomejs/biome/releases/download/@biomejs/biome@${BIOME_VERSION}/biome-linux-x64"
          chmod +x "${RUNNER_TEMP}/biome"
          # Run from inside the theme dir with no path argument: biome v2 treats a
          # biome.json as a project root, so invoking from the repo root flags the
          # theme config as a root nested under the repo-root project. From the
          # theme dir its biome.json is the sole root, and omitting the path lets
          # files.includes scope the run to the authored CSS (a path argument would
          # override the config and pull in the vendored normalize.css/syntax.css).
          ( cd docs/themes/metio && "${RUNNER_TEMP}/biome" lint )
  container-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - id: image
        name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ghcr.io/metio/stageset-controller:${{ github.sha }}
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/metio/stageset-controller:${{ github.sha }}
          format: table
          # Hard gate on any fixable CRITICAL/HIGH in the distroless image:
          # the base is slim and patched, so findings are rare and worth
          # investigating before merge.
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
  dco:
    # Developer Certificate of Origin: every commit must carry a Signed-off-by
    # trailer. Skipped for bot-authored PRs (Renovate/Dependabot cannot sign off);
    # a skipped job still satisfies the all-green gate below.
    if: github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on every commit
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          status=0
          for sha in $(git rev-list "$BASE..$HEAD"); do
            name=$(git show -s --format='%an' "$sha")
            case "$name" in
              *'[bot]'*) echo "skip bot commit ${sha:0:8} ($name)"; continue ;;
            esac
            if git show -s --format='%B' "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "ok   ${sha:0:8}"
            else
              echo "::error::commit ${sha:0:8} by '$name' is missing a Signed-off-by line (use git commit --signoff)"
              status=1
            fi
          done
          exit $status
  all-green:
    # Single required check covering every job above: mark only this one
    # required in branch protection and new jobs are covered automatically.
    name: Verify — all checks passed
    needs: [discover-envtest, test, lint-go, vulnerabilities, architecture, reuse, yaml, github-actions, markdown, typos, prose, docs-lint, container-image, dco]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify every job succeeded or skipped
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          bad=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | "\(.key)=\(.value.result)"')
          [ -z "$bad" ] || { echo "::error::$bad"; exit 1; }
