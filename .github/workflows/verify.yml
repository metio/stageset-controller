name: Verify
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go test -race -shuffle=on -coverprofile=cover.out ./...
  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...
      - run: go run github.com/securego/gosec/v2/cmd/gosec@latest ./...
      - name: gofumpt formatting
        run: |
          unformatted="$(go run mvdan.cc/gofumpt@latest -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofumpt-formatted:"
            echo "$unformatted"
            exit 1
          fi
  vulnerabilities:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      # Hard gate: a reachable-from-code advisory blocks merge. Resolution is
      # usually a bump of the `toolchain` directive in go.mod (stdlib advisories)
      # or `go get -u` (deps).
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
  architecture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go run github.com/arch-go/arch-go@latest
  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6
  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: pipx install yamllint && yamllint .
  github-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
        with:
          globs: "**/*.md"
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1
  prose:
    # Vale prose lint against the shared metio/vale-config style; .vale.ini pulls
    # the published package. Fails on error-level findings (naming/branding);
    # inclusive-language findings are warning-level and only annotate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: vale-cli/vale-action@85f9f7f2c5f449ac0ae5b66662961bae3f77ca6a # 2.1.2 # renovate: pin to a SHA
        with:
          files: docs/content
          fail_on_error: true
  container-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - id: image
        name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ghcr.io/metio/stageset-controller:${{ github.sha }}
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/metio/stageset-controller:${{ github.sha }}
          format: table
          # Hard gate on any fixable CRITICAL/HIGH in the distroless image:
          # the base is slim and patched, so findings are rare and worth
          # investigating before merge.
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
  dco:
    # Developer Certificate of Origin: every commit must carry a Signed-off-by
    # trailer. Skipped for bot-authored PRs (Renovate/Dependabot cannot sign off);
    # a skipped job still satisfies the all-green gate below.
    if: github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on every commit
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          status=0
          for sha in $(git rev-list "$BASE..$HEAD"); do
            name=$(git show -s --format='%an' "$sha")
            case "$name" in
              *'[bot]'*) echo "skip bot commit ${sha:0:8} ($name)"; continue ;;
            esac
            if git show -s --format='%B' "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "ok   ${sha:0:8}"
            else
              echo "::error::commit ${sha:0:8} by '$name' is missing a Signed-off-by line (use git commit --signoff)"
              status=1
            fi
          done
          exit $status
  all-green:
    # Single required check covering every job above: mark only this one
    # required in branch protection and new jobs are covered automatically.
    name: Verify — all checks passed
    needs: [test, lint-go, vulnerabilities, architecture, reuse, yaml, github-actions, markdown, typos, prose, container-image, dco]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify every job succeeded or skipped
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          bad=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | "\(.key)=\(.value.result)"')
          [ -z "$bad" ] || { echo "::error::$bad"; exit 1; }
