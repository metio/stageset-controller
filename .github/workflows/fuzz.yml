name: Fuzz
on:
  schedule:
    # Weekly, Sunday 03:17 UTC — deliberately off the Monday release cron so a
    # long campaign never overlaps a release run.
    - cron: '17 3 * * 0'
  workflow_dispatch:
    inputs:
      fuzztime:
        description: 'How long to fuzz each target (Go duration, e.g. 90s, 5m, 1h)'
        default: '5m'
permissions:
  contents: read
jobs:
  discover:
    # Enumerate every Fuzz* target as a {pkg, func} pair so new targets are
    # fuzzed automatically — no hand-maintained matrix to drift.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - id: list
        run: |
          matrix=$(grep -rE '^func Fuzz' --include='*_test.go' internal \
            | sed -E 's#^(internal/.+)/[^/]+_test\.go:func (Fuzz[A-Za-z0-9_]+).*#{"pkg":"./\1","func":"\2"}#' \
            | jq -s -c '{include: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix" | jq .
  fuzz:
    # A nightly fuzz pass is best-effort coverage, not a release gate: each
    # target runs its own coverage-guided campaign. A finding writes a crasher
    # to testdata/fuzz/, which is printed below and should be committed as a
    # permanent seed (it then reproduces deterministically in the Verify gate).
    needs: discover
    runs-on: ubuntu-latest
    # Must stay comfortably above the fuzztime dispatch input (default 5m) plus
    # setup; a dispatch fuzztime near or above this timeout will be cut short.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    env:
      FUZZTIME: ${{ github.event.inputs.fuzztime || '5m' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/ci/nix-devshell@ec60a096bd59b2b46e358bfca757f243c081ae13 # 2026.7.6074350
      # KUBEBUILDER_ASSETS is set by the devShell (assembled from nixpkgs), so an
      # envtest-backed fuzz target's TestMain finds a kube-apiserver with no
      # setup-envtest download; the cluster-free targets ignore the variable.
      - name: Fuzz ${{ matrix.func }} (${{ matrix.pkg }})
        run: nix develop --command go test -run='^$' -fuzz="^${{ matrix.func }}$" -fuzztime="$FUZZTIME" "${{ matrix.pkg }}"
      - name: Surface discovered crasher
        if: failure()
        run: |
          echo "::group::New fuzz corpus entries (crashers) — commit these as seeds"
          find internal -path '*/testdata/fuzz/*' -type f -print -exec cat {} \; || true
          echo "::endgroup::"
  all-green:
    # Single aggregate status mirroring the Verify convention: any failed or
    # cancelled leg fails this, so a notification on the scheduled run is enough.
    name: Fuzz — all targets passed
    needs: [discover, fuzz]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify every job succeeded or skipped
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          bad=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | "\(.key)=\(.value.result)"')
          [ -z "$bad" ] || { echo "::error::$bad"; exit 1; }
