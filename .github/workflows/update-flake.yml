# Zero-manual maintenance for the flake's from-source packages. arch-go,
# modernize, and helm-schema are not in nixpkgs, so Renovate's nix manager —
# which only bumps flake inputs — cannot update them, and it cannot recompute
# nix hashes for any Go package. nix-update does both (version + src hash +
# vendorHash), so this scheduled run keeps them current and opens a PR: no
# version or hash is ever hand-edited. nixpkgs itself stays Renovate's job (the
# nix lock-file maintenance in the org preset), and every nixpkgs-provided tool
# rides that.
name: Update flake packages
on:
  schedule:
    - cron: 30 5 * * MON
  workflow_dispatch:
permissions:
  contents: read
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # push the update branch
      pull-requests: write # open the PR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/ci/nix-devshell@50117191bb36382ab22777be480c539fc4c37fed # 2026.7.5211151
      - name: Bump the from-source flake packages (version + hashes)
        run: |
          for pkg in arch-go modernize helm-schema; do
            echo "::group::nix-update $pkg"
            nix run nixpkgs#nix-update -- --flake --version=stable "$pkg" || echo "::warning::nix-update $pkg made no change or failed"
            echo "::endgroup::"
          done
      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: flake-packages-update
          title: "chore(deps): update the from-source flake packages"
          commit-message: "chore(deps): update the from-source flake packages"
          body: |
            Automated `nix-update` of the flake packages nixpkgs does not ship
            (arch-go, modernize, helm-schema) — version, source hash, and
            vendorHash. Merge once the Verify gate is green.
          labels: dependencies
          delete-branch: true
