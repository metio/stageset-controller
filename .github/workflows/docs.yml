name: Documentation
on:
  workflow_dispatch:
  schedule:
    # Daily rebuild so the generated pages (flags, chart values) pick up changes
    # in the chart repo with no cross-repo trigger and no token to maintain. The
    # controller's own changes still rebuild immediately via the push paths below.
    - cron: 45 4 * * *
  push:
    branches: [main]
    paths:
      - docs/**
      # The flags page is generated from the binary's FlagSet, so a flag change
      # must rebuild the site even though no docs/ file changed.
      - cmd/main.go
      - internal/cliflags/**
      - hack/flaggen/**
      - hack/flatten-schema.jq
      - hack/gen-docs-data.sh
  pull_request:
    paths:
      - docs/**
      - cmd/main.go
      - internal/cliflags/**
      - hack/flaggen/**
      - hack/flatten-schema.jq
      - hack/gen-docs-data.sh
permissions:
  contents: read
jobs:
  website:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # renovate: datasource=github-releases depName=dadav/helm-schema
      GO_HELM_SCHEMA_VERSION: 0.23.4
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: latest
          extended: true
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install helm-schema
        # gen-docs-data.sh generates each chart's values.schema.json on the fly
        # from the Chart.yaml + values.yaml it fetches from helm-charts. Version
        # in lockstep with dev/Containerfile.
        run: curl -fsSL "https://github.com/dadav/helm-schema/releases/download/${GO_HELM_SCHEMA_VERSION}/helm-schema_${GO_HELM_SCHEMA_VERSION}_Linux_x86_64.tar.gz" | tar -xz -C /usr/local/bin helm-schema
      - name: Generate docs data (flags + chart values)
        # flaggen renders the binary's FlagSet; the chart values schema is
        # generated by helm-schema from the chart sources fetched from helm-charts
        # and flattened. Both land in docs/data/ and are gitignored — the
        # published site is always generated from source.
        run: hack/gen-docs-data.sh
      - name: Build Website
        run: hugo --minify --printI18nWarnings --printPathWarnings --source docs
      - name: Deploy Website
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/public
          force_orphan: true
          cname: stageset.projects.metio.wtf
