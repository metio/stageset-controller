name: Automated Release
on:
  schedule:
    - cron: 47 7 * * MON
  workflow_dispatch:
jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      commit_count: ${{ steps.commits.outputs.count }}
      release_version: ${{ steps.release.outputs.version }}
      previous_version: ${{ steps.last_release.outputs.tag }}
    steps:
      - id: checkout
        name: Clone Git Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - id: last_release
        name: Fetch last release info
        run: echo "tag=$(gh release view --json tagName --jq '.tagName')" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - id: commits
        name: Count Commits
        run: echo "count=$(git rev-list --count ${{ steps.last_release.outputs.tag }}..HEAD -- go.mod cmd internal api config Dockerfile)" >> $GITHUB_OUTPUT
      - id: release
        name: Create Release Version
        if: steps.commits.outputs.count > 0 || steps.last_release.outputs.tag == ''
        run: echo "version=$(date +'%Y.%-m.%-d')" >> $GITHUB_OUTPUT
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # The six linux architectures the container image ships (the set
        # gcr.io/distroless/static supports) plus windows and macOS (darwin) on
        # amd64/arm64 — the desktop platforms operators run the stagesetctl CLI
        # from. Both the controller binary and the CLI are built for every entry.
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: ppc64le
          - goos: linux
            goarch: riscv64
          - goos: linux
            goarch: s390x
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - id: checkout
        name: Clone Git Repository
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - id: setup_go
        name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        with:
          go-version-file: go.mod
          cache: true
      - id: build
        name: Build & Archive (controller + CLI)
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        # Cross-compile both binaries for this platform and archive each: tar.gz
        # on linux/darwin, zip on windows (with a .exe binary). Ships the
        # controller daemon (./cmd) and the stagesetctl CLI (./cmd/stagesetctl).
        run: |
          set -euo pipefail
          ver="${{ needs.prepare.outputs.release_version }}"
          os="${{ matrix.goos }}"
          arch="${{ matrix.goarch }}"
          ext=""
          [ "$os" = windows ] && ext=".exe"
          ldflags="-s -w -X main.version=${ver} -X main.commit=${{ github.sha }}"
          pack() {
            name="$1"; pkg="$2"
            go build -o "${name}_v${ver}${ext}" -trimpath -ldflags="${ldflags}" "${pkg}"
            if [ "$os" = windows ]; then
              zip "${name}_${ver}_${os}_${arch}.zip" "${name}_v${ver}${ext}" LICENSE README.md
            else
              tar --create --gzip --file "${name}_${ver}_${os}_${arch}.tar.gz" "${name}_v${ver}${ext}" LICENSE README.md
            fi
          }
          pack stageset-controller ./cmd
          pack stagesetctl ./cmd/stagesetctl
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
      - id: upload
        name: Upload Artifacts
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
          path: |
            *.tar.gz
            *.zip
  github:
    name: GitHub Release
    # Gate the release on a green image build too: the release notes advertise
    # ghcr.io/metio/stageset-controller:<version>, so that tag must exist before
    # the release is published. `build` supplies the attached binaries/checksums;
    # `container` serializes the release after the image build+push+sign (job
    # order in this file is irrelevant — `needs` drives execution), so a failed
    # build skips the release instead of leaving a published release that points
    # at a non-existent image. The cost is a longer wall-clock release; the
    # benefit is no dangling releases.
    needs: [prepare, build, container]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # cosign keyless sign-blob (Fulcio OIDC)
    steps:
      - id: checkout
        name: Clone Git Repository
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - id: cosign-install
        name: Install Cosign
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - id: git_cliff_install
        name: Install git-cliff
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/git-cliff.tar.gz \
            https://github.com/orhun/git-cliff/releases/download/v2.10.1/git-cliff-2.10.1-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf /tmp/git-cliff.tar.gz -C /tmp
          sudo install -m 0755 /tmp/git-cliff-2.10.1/git-cliff /usr/local/bin/git-cliff
          git-cliff --version
      - id: release_notes
        name: Generate Release Notes
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        # Render the notes from the org-wide git-cliff config (pinned by commit
        # SHA; Renovate's custom manager bumps it). On a first release the previous
        # version is empty, so the commit range is omitted and git-cliff walks the
        # whole history; otherwise scope it to <previous>..HEAD. The cosign verify
        # footer is appended verbatim so the verification instructions stay in the
        # published release body.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ver="${{ needs.prepare.outputs.release_version }}"
          prev="${{ needs.prepare.outputs.previous_version }}"
          config_url="https://raw.githubusercontent.com/metio/git-cliff-config/6fcc0b65dde726f59c09066fae227cec236ffd76/cliff.toml"
          common=(--config-url "${config_url}" --tag "${ver}" --tag-pattern '^[0-9]+\.[0-9]+\.[0-9]+$')
          if [ -n "${prev}" ]; then
            git-cliff "${common[@]}" "${prev}..HEAD" > notes.md
          else
            git-cliff "${common[@]}" > notes.md
          fi
          cat >> notes.md <<EOF

          ## Usage

          Pull the container from \`ghcr.io/metio/stageset-controller:${ver}\`.
          Check the [migration guide](https://github.com/metio/stageset-controller/blob/main/MIGRATIONS.md) for any required actions on your part.

          Prebuilt binaries are attached below for both the **controller**
          (\`stageset-controller_*\`) and the **\`stagesetctl\` CLI** (\`stagesetctl_*\`):

          - \`linux\`: \`amd64\`, \`arm\` (v7), \`arm64\`, \`ppc64le\`, \`riscv64\`, \`s390x\`
          - \`windows\`: \`amd64\`, \`arm64\` (\`.zip\`)
          - \`darwin\` (macOS): \`amd64\`, \`arm64\`

          The CLI doubles as a \`kubectl\` plugin: rename it to \`kubectl-stageset\`
          on your \`PATH\` and run \`kubectl stageset …\`.

          ## Verify

          Both the image and the release artifacts are signed with
          [cosign](https://github.com/sigstore/cosign) keyless — there is no GPG key to
          trust; identity is proven by the workflow's OIDC certificate.

          Container image:

          \`\`\`shell
          cosign verify ghcr.io/metio/stageset-controller:${ver} \\
            --certificate-identity-regexp '^https://github.com/metio/stageset-controller/\.github/workflows/release\.yml@refs/' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          \`\`\`

          Release artifacts (verify the signed checksum file, then check your download against it):

          \`\`\`shell
          cosign verify-blob stageset-controller_${ver}_SHA256SUMS \\
            --bundle stageset-controller_${ver}_SHA256SUMS.bundle \\
            --certificate-identity-regexp '^https://github.com/metio/stageset-controller/\.github/workflows/release\.yml@refs/' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          sha256sum -c stageset-controller_${ver}_SHA256SUMS
          \`\`\`
          EOF
      - id: download
        name: Download Artifacts
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - id: checksums
        name: Calculate Checksums
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        # One SHA256SUMS over every archive (tar.gz for linux/darwin, zip for
        # windows) across both binaries. nullglob keeps the glob empty-safe.
        run: |
          cd dist
          shopt -s nullglob
          sha256sum *.tar.gz *.zip > ${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_SHA256SUMS
      - id: sign_checksums
        name: Sign Checksums (cosign keyless)
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        # Newer cosign defaults to the Sigstore bundle format: --output-signature
        # / --output-certificate are ignored and a single --bundle file (signature
        # + certificate + Rekor proof) is written instead. Omitting --bundle makes
        # cosign try to open an empty path and fail the whole release.
        run: >
          cosign sign-blob
          --yes
          --bundle dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_SHA256SUMS.bundle
          dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_SHA256SUMS
      - id: create_release
        name: Create Release
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.prepare.outputs.release_version }}
          name: ${{ needs.prepare.outputs.release_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          body_path: notes.md
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_SHA256SUMS
            dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.release_version }}_SHA256SUMS.bundle
  container:
    name: Container Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - id: checkout
        name: Clone Git Repository
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - id: cosign-install
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - id: buildx
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - id: registry_login
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: timestamp
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Create Timestamp
        run: echo "date=$(date --rfc-3339=seconds)" >> $GITHUB_OUTPUT
      - id: publish
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Publish Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          push: true
          # Same arch set every metio image ships. The Dockerfile cross-compiles
          # via Go (builder pinned to $BUILDPLATFORM), so no QEMU is needed.
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/ppc64le,linux/riscv64,linux/s390x
          build-args: |
            VERSION=${{ needs.prepare.outputs.release_version }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/metio/stageset-controller:latest
            ghcr.io/metio/stageset-controller:${{ needs.prepare.outputs.release_version }}
          labels: |
            org.opencontainers.image.title=stageset-controller
            org.opencontainers.image.licenses=0BSD
            org.opencontainers.image.vendor=metio
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.release_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.timestamp.outputs.date }}
          cache-from: type=registry,ref=ghcr.io/metio/stageset-controller:buildcache
          cache-to: type=registry,ref=ghcr.io/metio/stageset-controller:buildcache,mode=max
          sbom: true
          provenance: true
      - id: sign_image
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Sign Image
        run: |
          cosign sign \
            --yes \
            --annotations "repo=${{ github.repository }}" \
            --annotations "workflow=${{ github.workflow }}" \
            --annotations "ref=${{ github.sha }}" \
            ghcr.io/metio/stageset-controller@${{ steps.publish.outputs.digest }}
