name: Automated Release
on:
  push:
    branches: [main]
  workflow_dispatch:
# Serialize release runs. Each run's release-notes lower bound is the latest tag
# at the time its prepare job runs; two merges in quick succession would both
# read that bound before either run has tagged, producing overlapping notes.
# Queueing (no cancel) lets the earlier release finish and create its tag first,
# so the next run's notes start from that tag and carry only its own commits.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      needed: ${{ steps.gate.outputs.needed }}
      version: ${{ steps.version.outputs.version }}
      previous: ${{ steps.gate.outputs.last }}
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - id: gate
        name: Check whether a release is needed
        uses: metio/ci/needs-release@cc725e2e1fbc779fda95050562d702128ad6e998 # 2026.7.6083955
        with:
          paths: go.mod cmd internal api config Dockerfile
      - id: version
        name: Compute the next version
        if: steps.gate.outputs.needed == 'true'
        uses: metio/ci/calver@cc725e2e1fbc779fda95050562d702128ad6e998 # 2026.7.6083955
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: prepare
    if: needs.prepare.outputs.needed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        # The six linux architectures the container image ships (the set
        # gcr.io/distroless/static supports) plus windows and macOS (darwin) on
        # amd64/arm64 — the desktop platforms operators run the stagesetctl CLI
        # from. Both the controller binary and the CLI are built for every entry.
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: ppc64le
          - goos: linux
            goarch: riscv64
          - goos: linux
            goarch: s390x
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/ci/nix-devshell@cc725e2e1fbc779fda95050562d702128ad6e998 # 2026.7.6083955
      - id: build
        name: Build & Archive (controller + CLI)
        # Cross-compile both binaries for this platform and archive each: tar.gz
        # on linux/darwin, zip on windows (with a .exe binary). Ships the
        # controller daemon (./cmd) and the stagesetctl CLI (./cmd/stagesetctl).
        # go comes from the flake; GOOS/GOARCH/CGO_ENABLED ride the step env.
        run: |
          set -euo pipefail
          ver="${{ needs.prepare.outputs.version }}"
          os="${{ matrix.goos }}"
          arch="${{ matrix.goarch }}"
          ext=""
          [ "$os" = windows ] && ext=".exe"
          ldflags="-s -w -X main.version=${ver} -X main.commit=${{ github.sha }}"
          pack() {
            name="$1"; pkg="$2"
            nix develop --command go build -o "${name}_v${ver}${ext}" -trimpath -ldflags="${ldflags}" "${pkg}"
            if [ "$os" = windows ]; then
              zip "${name}_${ver}_${os}_${arch}.zip" "${name}_v${ver}${ext}" LICENSE README.md
            else
              tar --create --gzip --file "${name}_${ver}_${os}_${arch}.tar.gz" "${name}_v${ver}${ext}" LICENSE README.md
            fi
          }
          pack stageset-controller ./cmd
          pack stagesetctl ./cmd/stagesetctl
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
          path: |
            *.tar.gz
            *.zip
  container:
    name: Container Release
    needs: [prepare, build]
    if: needs.prepare.outputs.needed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write # cosign keyless image signing
      contents: read
      packages: write # push to GHCR
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build, push and sign the image
        uses: metio/ci/container-release@cc725e2e1fbc779fda95050562d702128ad6e998 # 2026.7.6083955
        with:
          image: ghcr.io/${{ github.repository }}
          version: ${{ needs.prepare.outputs.version }}
  github:
    name: GitHub Release
    # Gate the release on a green image build too: the release notes advertise
    # ghcr.io/metio/stageset-controller:<version>, so that tag must exist before
    # the release is published. A failed build/container skips the release instead
    # of leaving a published release that points at a non-existent image.
    needs: [prepare, build, container]
    if: needs.prepare.outputs.needed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create the GitHub Release
      id-token: write # cosign keyless sign-blob (Fulcio OIDC)
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - name: Calculate Checksums
        # One SHA256SUMS over every archive (tar.gz for linux/darwin, zip for
        # windows) across both binaries. nullglob keeps the glob empty-safe.
        env:
          SUMS: ${{ github.event.repository.name }}_${{ needs.prepare.outputs.version }}_SHA256SUMS
        run: |
          cd dist
          shopt -s nullglob
          sha256sum ./*.tar.gz ./*.zip > "$SUMS"
      - name: Sign Checksums (cosign keyless)
        uses: metio/ci/cosign-sign-blob@cc725e2e1fbc779fda95050562d702128ad6e998 # 2026.7.6083955
        with:
          file: dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.version }}_SHA256SUMS
      - id: notes
        name: Generate Release Notes
        uses: metio/ci/release-notes@cc725e2e1fbc779fda95050562d702128ad6e998 # 2026.7.6083955
        with:
          version: ${{ needs.prepare.outputs.version }}
          previous: ${{ needs.prepare.outputs.previous }}
      - name: Append usage and verification footer
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          NOTES: ${{ steps.notes.outputs.file }}
        run: |
          cat >> "$NOTES" <<EOF

          ## Usage

          Pull the container from \`ghcr.io/metio/stageset-controller:${VERSION}\`.
          See **Upgrading** — https://stageset.projects.metio.wtf/installation/upgrading/ — for any required actions on your part.

          Prebuilt binaries are attached below for both the **controller**
          (\`stageset-controller_*\`) and the **\`stagesetctl\` CLI** (\`stagesetctl_*\`):

          - \`linux\`: \`amd64\`, \`arm\` (v7), \`arm64\`, \`ppc64le\`, \`riscv64\`, \`s390x\`
          - \`windows\`: \`amd64\`, \`arm64\` (\`.zip\`)
          - \`darwin\` (macOS): \`amd64\`, \`arm64\`

          The CLI doubles as a \`kubectl\` plugin: rename it to \`kubectl-stageset\`
          on your \`PATH\` and run \`kubectl stageset …\`.

          ## Verify

          All release artifacts are signed with cosign keyless. See **Verifying releases** — https://stageset.projects.metio.wtf/installation/verifying-releases/ — for the verification commands.
          EOF
      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          body_path: ${{ steps.notes.outputs.file }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.version }}_SHA256SUMS
            dist/${{ github.event.repository.name }}_${{ needs.prepare.outputs.version }}_SHA256SUMS.bundle
