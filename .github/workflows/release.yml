name: Automated Release
on:
  schedule:
    - cron: 47 7 * * MON
  workflow_dispatch:
jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      commit_count: ${{ steps.commits.outputs.count }}
      release_version: ${{ steps.release.outputs.version }}
      previous_version: ${{ steps.last_release.outputs.tag }}
    steps:
      - id: checkout
        name: Clone Git Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: last_release
        name: Fetch last release info
        run: echo "tag=$(gh release view --json tagName --jq '.tagName')" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - id: commits
        name: Count Commits
        run: echo "count=$(git rev-list --count ${{ steps.last_release.outputs.tag }}..HEAD -- go.mod cmd internal api config Dockerfile)" >> $GITHUB_OUTPUT
      - id: release
        name: Create Release Version
        if: steps.commits.outputs.count > 0 || steps.last_release.outputs.tag == ''
        run: echo "version=$(date +'%Y.%-m.%-d')" >> $GITHUB_OUTPUT
  github:
    name: GitHub Release
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - id: checkout
        name: Clone Git Repository
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: create_release
        name: Create Release
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ needs.prepare.outputs.release_version }}
          name: ${{ needs.prepare.outputs.release_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          body: |
            ## Usage

            Pull the latest container from `ghcr.io/metio/stageset-controller:${{ needs.prepare.outputs.release_version }}`. Check the [migration guide](https://github.com/metio/flux-stageset-controller/blob/main/MIGRATIONS.md) for any required actions on your part.

            The image is a multi-arch manifest (`linux/amd64`, `arm64`, `arm/v7`, `ppc64le`, `riscv64`, `s390x`) and is signed with cosign keyless. Verify it before deploying:

            ```shell
            cosign verify ghcr.io/metio/stageset-controller:${{ needs.prepare.outputs.release_version }} \
              --certificate-identity-regexp '^https://github.com/metio/flux-stageset-controller/' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
            ```
          generate_release_notes: true
  container:
    name: Container Release
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - id: checkout
        name: Clone Git Repository
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        uses: actions/checkout@v6
      - id: cosign-install
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - id: buildx
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - id: registry_login
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: timestamp
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Create Timestamp
        run: echo "date=$(date --rfc-3339=seconds)" >> $GITHUB_OUTPUT
      - id: publish
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Publish Image
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          push: true
          # Same arch set every metio image ships. The Dockerfile cross-compiles
          # via Go (builder pinned to $BUILDPLATFORM), so no QEMU is needed.
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/ppc64le,linux/riscv64,linux/s390x
          build-args: |
            VERSION=${{ needs.prepare.outputs.release_version }}
            COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/metio/stageset-controller:latest
            ghcr.io/metio/stageset-controller:${{ needs.prepare.outputs.release_version }}
          labels: |
            org.opencontainers.image.title=stageset-controller
            org.opencontainers.image.licenses=0BSD
            org.opencontainers.image.vendor=metio
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.prepare.outputs.release_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.timestamp.outputs.date }}
          cache-from: type=registry,ref=ghcr.io/metio/stageset-controller:buildcache
          cache-to: type=registry,ref=ghcr.io/metio/stageset-controller:buildcache,mode=max
          sbom: true
          provenance: true
      - id: sign_image
        if: needs.prepare.outputs.commit_count > 0 || needs.prepare.outputs.previous_version == ''
        name: Sign Image
        run: |
          cosign sign \
            --yes \
            --annotations "repo=${{ github.repository }}" \
            --annotations "workflow=${{ github.workflow }}" \
            --annotations "ref=${{ github.sha }}" \
            ghcr.io/metio/stageset-controller@${{ steps.publish.outputs.digest }}
