name: Kind smoke test
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Angle 1 of the two-angle e2e strategy: the DEV binary (this PR's HEAD build)
# is deployed via the committed manifests and run through the shared
# hack/smoke/*.sh scenarios. Angle 2 lives in metio/helm-charts
# (stageset-smoke.yml): the DEV chart deploys the LATEST RELEASED binary and
# runs the SAME scripts (checked out from this repo at the released tag). Each
# angle holds one moving part and tests it against the released counterpart.
#
# The smoke is deliberately self-contained: it plants ExternalArtifacts whose
# tarball bytes these scenarios control (an in-cluster static file server), so
# the resolve -> fetch -> digest-verify -> build -> apply -> prune pipeline runs
# deterministically with no live source-controller. fail-fast is OFF so one bad
# k8s minor does not mask the others.
#
# No paths filter: the workflow runs on every PR and self-gates on the
# `relevant` output so the `all-green` aggregate is always reportable (a single
# required check covers the dynamically-named matrix legs).
jobs:
  discover:
    name: Discover Kubernetes versions to test against
    runs-on: ubuntu-latest
    outputs:
      k8s_versions: ${{ steps.versions.outputs.k8s }}
      kind_latest: ${{ steps.kind.outputs.kind_latest }}
      relevant: ${{ steps.scope.outputs.relevant }}
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - id: scope
        name: Did this PR touch the binary, manifests, or smoke wiring?
        run: |
          set -uo pipefail
          base="origin/${{ github.base_ref || 'main' }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             git diff --name-only "$base" HEAD \
               | grep -qE '^(api|cmd|config|internal)/|^Dockerfile$|^hack/smoke/|^\.github/workflows/kind-smoke\.yml$|^go\.(mod|sum)$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No binary / manifest / smoke changes in this PR — kind jobs skip (gate stays green)."
          fi
      - id: versions
        name: Discover the newest kindest/node minors
        run: |
          set -uo pipefail
          # Newest 4 kindest/node minors, latest patch each. A new k8s release is
          # tested automatically; if kind can't run a brand-new minor yet, that
          # surfaces as a failure — the signal to bump kind, not silent staleness.
          k8s=$(curl -fsSL "https://hub.docker.com/v2/repositories/kindest/node/tags?page_size=100" \
            | jq -r '.results[].name' | grep -E '^v1\.[0-9]+\.[0-9]+$' \
            | awk -F. '{print $1"."$2" "$0}' | sort -k1,1V -k2,2V \
            | awk '{l[$1]=$2} END{for(m in l)print l[m]}' | sort -V | tail -4 \
            | jq -R . | jq -cs . 2>/dev/null || echo '[]')
          [ "$(jq 'length' <<<"$k8s" 2>/dev/null || echo 0)" -gt 0 ] || k8s='["v1.33.1"]'
          echo "k8s=$k8s" >> "$GITHUB_OUTPUT"
          echo "k8s=$k8s"
      - id: kind
        name: Discover the newest kind release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # The pinned helm/kind-action bundles a kind binary that can lag new
          # kindest/node images — a brand-new node image then fails to load with
          # "unknown containerd config version: N". Pin the newest kind release so
          # the binary matches the node image; empty falls back to the action default.
          kv=$(gh release list --repo kubernetes-sigs/kind --limit 30 \
                 --json tagName,isPrerelease \
                 --jq '.[] | select(.isPrerelease==false) | .tagName' \
               | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          echo "kind_latest=$kv" >> "$GITHUB_OUTPUT"
          echo "kind_latest=$kv"

  smoke:
    name: k8s ${{ matrix.k8s_version }}
    needs: discover
    if: needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Swept across the newest Kubernetes versions the discover job found — no
        # hardcoded versions, so a new k8s release is tested with no manual edit.
        k8s_version: ${{ fromJSON(needs.discover.outputs.k8s_versions) }}
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Build container image
        run: docker build -t ghcr.io/metio/stageset-controller:smoke .

      - name: Create kind cluster (k8s ${{ matrix.k8s_version }})
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: stageset-smoke
          node_image: kindest/node:${{ matrix.k8s_version }}

      - name: Load image into kind
        run: kind load docker-image ghcr.io/metio/stageset-controller:smoke --name stageset-smoke

      - name: Install StageSet CRDs
        run: kubectl apply -f config/crd/

      - name: Install ExternalArtifact stub CRD
        run: hack/smoke/setup-externalartifact-crd.sh

      - name: Deploy the controller (dev image)
        run: |
          kubectl apply -f config/rbac/role.yaml
          # Smoke-only broad grant: the committed manifests assume per-tenant
          # impersonation for cluster writes, but this smoke applies with the
          # controller's own ServiceAccount, so it needs to create the manifests
          # the StageSet renders plus emit Events.
          kubectl create clusterrolebinding stageset-smoke-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=stageset-system:stageset-controller
          sed 's#ghcr.io/metio/stageset-controller:latest#ghcr.io/metio/stageset-controller:smoke#' \
            config/manager/manager.yaml | kubectl apply -f -
          kubectl -n stageset-system rollout status deploy/stageset-controller --timeout=180s

      - name: Scenario — basic apply + inventory + finalizer prune
        run: hack/smoke/scenario-basic.sh

      - name: Scenario — impersonation (spec.serviceAccountName)
        run: hack/smoke/scenario-impersonation.sh

      - name: Scenario — cross-namespace fetch under NetworkPolicy
        run: hack/smoke/scenario-networkpolicy.sh
        env:
          CONTROLLER_NS: stageset-system

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get nodes -o wide || true
          kubectl -n stageset-system get all || true
          kubectl -n stageset-system logs deploy/stageset-controller --tail=300 || true
          kubectl -n default get all || true
          kubectl -n tenant get all || true
          kubectl -n np-test get all || true
          kubectl -n np-test get networkpolicy -o wide || true
          kubectl get stageset -A || true
          kubectl get stageinventories -A -o wide || true
          kubectl get externalartifact -A || true
          kubectl get crd | grep -E "stages|fluxcd" || true

  all-green:
    name: Kind smoke — all checks passed
    needs: [discover, smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify every job succeeded or skipped
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          bad=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | "\(.key)=\(.value.result)"')
          [ -z "$bad" ] || { echo "::error::$bad"; exit 1; }
