name: Kind smoke test
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read

# Angle 1 of the two-angle e2e strategy: the DEV binary (this PR's HEAD build)
# deployed via the LATEST RELEASED chart (oci://ghcr.io/metio/helm-charts/stageset-controller),
# run through the shared hack/smoke/*.sh scenarios. Angle 2 lives in
# metio/helm-charts (stageset-smoke.yml): the DEV chart deploys the LATEST
# RELEASED binary and runs the SAME scripts. Each angle holds one moving part
# and tests it against the released counterpart. The chart is the single source
# of deployment manifests — there is no committed kustomize Deployment to drift.
#
# The smoke is deliberately self-contained: it plants ExternalArtifacts whose
# tarball bytes these scenarios control (an in-cluster static file server), so
# the resolve -> fetch -> digest-verify -> build -> apply -> prune pipeline runs
# deterministically with no live source-controller. fail-fast is OFF so one bad
# k8s minor does not mask the others.
#
# No paths filter: the workflow runs on every PR and self-gates on the
# `relevant` output so the `all-green` aggregate is always reportable (a single
# required check covers the dynamically-named matrix legs). Both the kind jobs
# and the gate stay green-by-skip until the first stageset chart release exists.
jobs:
  discover:
    name: Discover released chart + Kubernetes versions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      chart_version: ${{ steps.find.outputs.version }}
      k8s_versions: ${{ steps.versions.outputs.k8s }}
      k8s_latest: ${{ steps.versions.outputs.k8s_latest }}
      flux_versions: ${{ steps.versions.outputs.flux }}
      flux_latest: ${{ steps.versions.outputs.flux_latest }}
      kind_latest: ${{ steps.kind.outputs.kind_latest }}
      relevant: ${{ steps.scope.outputs.relevant }}
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - id: scope
        name: Did this PR touch the binary, CRDs, or smoke wiring?
        env:
          # base_ref is attacker-influenced; expand it as a shell variable, never
          # directly into the script.
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          set -uo pipefail
          base="origin/${BASE_REF}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             git diff --name-only "$base" HEAD \
               | grep -qE '^(api|cmd|config|internal)/|^Dockerfile$|^hack/smoke/|^\.github/workflows/kind-smoke\.yml$|^go\.(mod|sum)$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No binary / CRD / smoke changes in this PR — kind jobs skip (gate stays green)."
          fi
      - id: find
        name: Find newest stageset chart release in metio/helm-charts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The helm-charts release pipeline tags each chart release
          # `<chart>-<version>`; releases sort newest-first.
          tag="$(gh release list --repo metio/helm-charts --limit 100 \
                  --json tagName \
                  --jq '[.[] | select(.tagName | startswith("stageset-controller-")) | .tagName] | .[0] // ""' 2>/dev/null || true)"
          v="${tag#stageset-controller-}"
          if [ -z "$v" ]; then
            echo "::notice::No released stageset chart yet (metio/helm-charts has no stageset-controller-* release); smoke jobs skip until the first release."
          else
            echo "latest released chart version: $v"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - id: versions
        name: Discover the newest Kubernetes + Flux versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # Newest 4 kindest/node minors, latest patch each. A new k8s release is
          # tested automatically; if kind can't run a brand-new minor yet, that
          # surfaces as a failure — the signal to bump kind, not silent staleness.
          k8s=$(curl -fsSL "https://hub.docker.com/v2/repositories/kindest/node/tags?page_size=100" \
            | jq -r '.results[].name' | grep -E '^v1\.[0-9]+\.[0-9]+$' \
            | awk -F. '{print $1"."$2" "$0}' | sort -k1,1V -k2,2V \
            | awk '{l[$1]=$2} END{for(m in l)print l[m]}' | sort -V | tail -4 \
            | jq -R . | jq -cs . 2>/dev/null || echo '[]')
          [ "$(jq 'length' <<<"$k8s" 2>/dev/null || echo 0)" -gt 0 ] || k8s='["v1.33.1"]'
          # Newest 3 Flux minors at or above the ExternalArtifact floor (v2.7.0 /
          # source-controller v1.7.0); below that the source CRDs lack
          # ExternalArtifact. The major>2 clause keeps a future v3.x in range.
          # Each version's real source CRDs are installed at smoke time, so this
          # actually exercises the controller against the evolving schema.
          flux=$(gh release list --repo fluxcd/flux2 --limit 60 --json tagName,isPrerelease \
                   --jq '.[] | select(.isPrerelease==false) | .tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | awk -F. '{m=$1;sub(/^v/,"",m); if(m>2||(m==2&&$2>=7))print}' \
            | awk -F. '{print $1"."$2" "$0}' | sort -k1,1V -k2,2V \
            | awk '{l[$1]=$2} END{for(m in l)print l[m]}' | sort -V | tail -3 \
            | jq -R . | jq -cs . 2>/dev/null || echo '[]')
          [ "$(jq 'length' <<<"$flux" 2>/dev/null || echo 0)" -gt 0 ] || flux='["v2.7.0"]'
          {
            echo "k8s=$k8s"
            echo "k8s_latest=$(jq -r '.[-1]' <<<"$k8s")"
            echo "flux=$flux"
            echo "flux_latest=$(jq -r '.[-1]' <<<"$flux")"
          } >> "$GITHUB_OUTPUT"
          echo "k8s=$k8s  flux=$flux"
      - id: kind
        name: Discover the newest kind release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # The pinned helm/kind-action bundles a kind binary that can lag new
          # kindest/node images — a brand-new node image then fails to load with
          # "unknown containerd config version: N". Pin the newest kind release so
          # the binary matches the node image; empty falls back to the action default.
          kv=$(gh release list --repo kubernetes-sigs/kind --limit 30 \
                 --json tagName,isPrerelease \
                 --jq '.[] | select(.isPrerelease==false) | .tagName' \
               | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          echo "kind_latest=$kv" >> "$GITHUB_OUTPUT"
          echo "kind_latest=$kv"

  smoke:
    name: k8s ${{ matrix.k8s_version }} / Flux ${{ matrix.flux_version }}
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # Swept across the newest Kubernetes AND Flux versions the discover job
        # found — no hardcoded versions, so a new k8s or Flux release is tested
        # with no manual edit. The Flux axis installs that version's real source
        # CRDs, exercising the controller against the evolving schema.
        k8s_version: ${{ fromJSON(needs.discover.outputs.k8s_versions) }}
        flux_version: ${{ fromJSON(needs.discover.outputs.flux_versions) }}
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Build container image
        run: docker build -t ghcr.io/metio/stageset-controller:smoke .

      - name: Create kind cluster (k8s ${{ matrix.k8s_version }})
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: stageset-smoke
          node_image: kindest/node:${{ matrix.k8s_version }}
          wait: 180s

      - name: Load image into kind
        run: kind load docker-image ghcr.io/metio/stageset-controller:smoke --name stageset-smoke

      - name: Install Flux ${{ matrix.flux_version }} source CRDs (real schema)
        run: hack/smoke/setup-flux-source-crds.sh ${{ matrix.flux_version }}

      - name: Install the released chart with the dev image
        run: |
          # Webhook disabled: the shared scenarios test the data plane
          # (resolve/fetch/build/apply/prune/impersonate), not admission, and
          # would otherwise hit the webhook's cert + readiness race. Admission
          # is covered by the binary's envtest suite. image.pullPolicy defaults
          # to IfNotPresent, so the kind-loaded :smoke image is used as-is.
          helm upgrade --install stageset oci://ghcr.io/metio/helm-charts/stageset-controller \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace stageset-system --create-namespace \
            --set-string image.tag=smoke \
            --set webhook.enabled=false \
            --wait --timeout 5m
          # The released chart's vendored CRDs lag HEAD; the dev binary must run
          # against its current schema, so overlay config/crd (README.md in that
          # dir is ignored by kubectl's extension filter).
          kubectl apply --server-side --force-conflicts -f config/crd/
          # Smoke-only broad grant: scenarios without a spec.serviceAccountName
          # apply under the controller's own identity, so it needs to create the
          # rendered objects and emit Events cluster-wide. The released chart
          # predates the rbac.clusterAdmin value (angle 2 sets that instead); once
          # a chart release carries it, this hand-rolled binding can drop to
          # --set rbac.clusterAdmin=true above.
          kubectl create clusterrolebinding stageset-smoke-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=stageset-system:stageset-controller

      - name: Scenario — basic apply + inventory + finalizer prune
        run: hack/smoke/scenario-basic.sh

      - name: Scenario — impersonation (spec.serviceAccountName)
        run: hack/smoke/scenario-impersonation.sh

      - name: Scenario — cross-namespace fetch under NetworkPolicy
        run: hack/smoke/scenario-networkpolicy.sh
        env:
          CONTROLLER_NS: stageset-system

      - name: Scenario — stagesetctl CLI (get, build, diff, reconcile)
        run: hack/smoke/scenario-cli.sh

      - name: Scenario — direct Git/OCI/Bucket sources (+ default-interval)
        run: hack/smoke/scenario-direct-source.sh

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get nodes -o wide || true
          helm -n stageset-system status stageset || true
          kubectl -n stageset-system get all || true
          kubectl -n stageset-system logs deploy/stageset-controller --tail=300 || true
          kubectl -n default get all || true
          kubectl -n tenant get all || true
          kubectl -n np-test get all || true
          kubectl -n np-test get networkpolicy -o wide || true
          kubectl get stageset -A || true
          kubectl get stageinventories -A -o wide || true
          kubectl get externalartifact -A || true
          kubectl get crd | grep -E "stages|fluxcd" || true

  s3:
    name: S3 rollback store (Adobe S3Mock)
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Build container image
        run: docker build -t ghcr.io/metio/stageset-controller:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: stageset-s3
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image ghcr.io/metio/stageset-controller:smoke --name stageset-s3
      - name: Cluster prereqs (Flux source CRDs + S3Mock)
        run: |
          hack/smoke/setup-flux-source-crds.sh ${{ needs.discover.outputs.flux_latest }}
          hack/smoke/setup-s3mock.sh
      - name: Install the released chart (S3Mock rollback store) with the dev image
        run: |
          # S3Mock validates no signature, so anonymous mode is correct here; do
          # NOT assert SSE — S3Mock only fakes it (it tolerates the chart's
          # default sse=s3 header but does not encrypt). The SeaweedFS job covers
          # real SigV4 / multipart / SSE. Webhook off, same as the matrix job.
          helm upgrade --install stageset oci://ghcr.io/metio/helm-charts/stageset-controller \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace stageset-system --create-namespace \
            --set-string image.tag=smoke \
            --set webhook.enabled=false \
            --set rollbackStore.backend=s3 \
            --set rollbackStore.s3.endpoint=s3mock.s3mock.svc:9090 \
            --set rollbackStore.s3.bucket=stageset-rollback \
            --set rollbackStore.s3.useSSL=false \
            --set rollbackStore.s3.anonymous=true \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/
          kubectl create clusterrolebinding stageset-smoke-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=stageset-system:stageset-controller
      - name: Scenario — S3 rollback-store round-trip
        run: hack/smoke/scenario-rollback-s3.sh
        env:
          NAME: rollback-s3mock
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n stageset-system get all || true
          kubectl -n stageset-system logs deploy/stageset-controller --tail=300 || true
          kubectl -n s3mock logs deploy/s3mock --tail=200 || true
          kubectl -n default describe stageset rollback-s3mock || true
          kubectl -n default get events --field-selector involvedObject.name=rollback-s3mock || true

  s3-seaweedfs:
    name: S3 rollback store (SeaweedFS — real SigV4 + multipart + SSE)
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Build container image
        run: docker build -t ghcr.io/metio/stageset-controller:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: stageset-seaweedfs
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image ghcr.io/metio/stageset-controller:smoke --name stageset-seaweedfs
      - name: Cluster prereqs (Flux source CRDs + SeaweedFS)
        run: |
          hack/smoke/setup-flux-source-crds.sh ${{ needs.discover.outputs.flux_latest }}
          hack/smoke/setup-seaweedfs.sh
      - name: Install the released chart (SeaweedFS rollback store, real creds + SSE) with the dev image
        run: |
          kubectl create namespace stageset-system
          # Real credentialed access: SeaweedFS validates SigV4, so anonymous is
          # off and the keys ride in via a credentials Secret (AWS_* keys) the
          # chart wires onto the pod with envFrom. rollbackStore.s3.sse=s3
          # exercises genuine server-side encryption — the fidelity the in-memory
          # S3Mock job can't provide.
          kubectl -n stageset-system create secret generic stageset-rollback-creds \
            --from-literal=AWS_ACCESS_KEY_ID=stageset-smoke \
            --from-literal=AWS_SECRET_ACCESS_KEY=stageset-smoke-secret
          helm upgrade --install stageset oci://ghcr.io/metio/helm-charts/stageset-controller \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace stageset-system \
            --set-string image.tag=smoke \
            --set webhook.enabled=false \
            --set rollbackStore.backend=s3 \
            --set rollbackStore.s3.endpoint=seaweedfs.seaweedfs.svc:8333 \
            --set rollbackStore.s3.bucket=stageset-rollback \
            --set rollbackStore.s3.useSSL=false \
            --set rollbackStore.s3.anonymous=false \
            --set rollbackStore.s3.sse=s3 \
            --set rollbackStore.s3.existingSecret=stageset-rollback-creds \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/
          kubectl create clusterrolebinding stageset-smoke-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=stageset-system:stageset-controller
      - name: Scenario — S3 rollback-store round-trip (SeaweedFS)
        run: hack/smoke/scenario-rollback-s3.sh
        env:
          NAME: rollback-seaweedfs
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n stageset-system get all || true
          kubectl -n stageset-system logs deploy/stageset-controller --tail=300 || true
          kubectl -n seaweedfs logs deploy/seaweedfs --tail=200 || true
          kubectl -n default describe stageset rollback-seaweedfs || true
          kubectl -n default get events --field-selector involvedObject.name=rollback-seaweedfs || true

  ha:
    name: HA (2 replicas, leader election failover)
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Build container image
        run: docker build -t ghcr.io/metio/stageset-controller:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: stageset-ha
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image ghcr.io/metio/stageset-controller:smoke --name stageset-ha
      - name: Cluster prereqs (Flux source CRDs)
        run: hack/smoke/setup-flux-source-crds.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install the released chart (2 replicas) with the dev image
        run: |
          # replicas.min/max=2 runs two controller pods; leader election gates
          # which one reconciles. Webhook off, same as the matrix job.
          helm upgrade --install stageset oci://ghcr.io/metio/helm-charts/stageset-controller \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace stageset-system --create-namespace \
            --set-string image.tag=smoke \
            --set webhook.enabled=false \
            --set replicas.min=2 \
            --set replicas.max=2 \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/
          kubectl create clusterrolebinding stageset-smoke-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=stageset-system:stageset-controller
      - name: Scenario — leader failover
        run: hack/smoke/scenario-ha.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n stageset-system get all || true
          kubectl -n stageset-system get lease || true
          kubectl -n stageset-system logs deploy/stageset-controller --tail=300 --all-pods || true
          kubectl -n default describe stageset ha-demo || true

  selfsigned:
    name: Self-signed webhook (in-pod CA + VWC caBundle patch)
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Build container image
        run: docker build -t ghcr.io/metio/stageset-controller:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: stageset-selfsigned
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image ghcr.io/metio/stageset-controller:smoke --name stageset-selfsigned
      - name: Cluster prereqs (Flux source CRDs)
        run: hack/smoke/setup-flux-source-crds.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install the released chart (self-signed webhook) with the dev image
        run: |
          # The one job that keeps the webhook ON: in self-signed cert mode the
          # controller generates its own ECDSA CA in-pod and patches the named VWC's
          # caBundle (no cert-manager). certMode=self-signed is the chart default;
          # set it explicitly to harden against a default change. Release name
          # `stageset` in namespace `default` so the VWC the controller patches —
          # `{{ stageset.name }}-{{ stageset.namespace }}` = stageset-controller-default
          # (stageset.name = Chart.Name = stageset-controller) — matches the
          # scenario's VWC env default.
          helm upgrade --install stageset oci://ghcr.io/metio/helm-charts/stageset-controller \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace default \
            --set-string image.tag=smoke \
            --set webhook.enabled=true \
            --set webhook.certMode=self-signed \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/
          kubectl create clusterrolebinding stageset-smoke-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=default:stageset-controller
      - name: Scenario — self-signed webhook admission + caBundle patch
        run: hack/smoke/scenario-selfsigned-webhook.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n default get all || true
          kubectl -n default logs deploy/stageset-controller --tail=300 || true
          kubectl get validatingwebhookconfiguration stageset-controller-default -o yaml || true
          kubectl -n default describe stageset smoke-ss || true

  scale-smoke:
    name: Scale (50 StageSets off one shared ExternalArtifact)
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Build container image
        run: docker build -t ghcr.io/metio/stageset-controller:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: stageset-scale
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image ghcr.io/metio/stageset-controller:smoke --name stageset-scale
      - name: Cluster prereqs (Flux source CRDs)
        run: hack/smoke/setup-flux-source-crds.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install the released chart with the dev image
        run: |
          # Same install as the matrix job: webhook off (the scenario exercises the
          # data plane at fan-out, not admission), dev image, HEAD CRDs overlaid,
          # broad RoleBinding for the controller's own apply identity.
          helm upgrade --install stageset oci://ghcr.io/metio/helm-charts/stageset-controller \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace stageset-system --create-namespace \
            --set-string image.tag=smoke \
            --set webhook.enabled=false \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/
          kubectl create clusterrolebinding stageset-smoke-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=stageset-system:stageset-controller
      - name: Scenario — 50 StageSets converge + prune
        run: hack/smoke/scenario-scale.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n stageset-system get all || true
          kubectl -n stageset-system logs deploy/stageset-controller --tail=300 || true
          kubectl get stageset -A || true
          kubectl -n default get configmap | grep scale-applied || true

  new-fields:
    name: New fields (spec.suspend pause/resume + Events)
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Build container image
        run: docker build -t ghcr.io/metio/stageset-controller:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: stageset-new-fields
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image ghcr.io/metio/stageset-controller:smoke --name stageset-new-fields
      - name: Cluster prereqs (Flux source CRDs)
        run: hack/smoke/setup-flux-source-crds.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install the released chart with the dev image
        run: |
          # Same install as the matrix job: webhook off (the scenario does not
          # require admission), dev image, HEAD CRDs overlaid, broad RoleBinding
          # for the controller's own apply identity.
          helm upgrade --install stageset oci://ghcr.io/metio/helm-charts/stageset-controller \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace stageset-system --create-namespace \
            --set-string image.tag=smoke \
            --set webhook.enabled=false \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/
          kubectl create clusterrolebinding stageset-smoke-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=stageset-system:stageset-controller
      - name: Scenario — suspend/resume + Event emission
        run: hack/smoke/scenario-fields.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n stageset-system get all || true
          kubectl -n stageset-system logs deploy/stageset-controller --tail=300 || true
          kubectl get stageset -A || true
          kubectl -n default get events || true

  rollout-gates:
    name: Rollout gates (error-budget freeze via webhook metric)
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Build container image
        run: docker build -t ghcr.io/metio/stageset-controller:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: stageset-rollout-gates
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 180s
      - name: Load image into kind
        run: kind load docker-image ghcr.io/metio/stageset-controller:smoke --name stageset-rollout-gates
      - name: Cluster prereqs (Flux source CRDs)
        run: hack/smoke/setup-flux-source-crds.sh ${{ needs.discover.outputs.flux_latest }}
      - name: Install the released chart with the dev image
        run: |
          helm upgrade --install stageset oci://ghcr.io/metio/helm-charts/stageset-controller \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace stageset-system --create-namespace \
            --set-string image.tag=smoke \
            --set webhook.enabled=false \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/
          kubectl create clusterrolebinding stageset-smoke-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=stageset-system:stageset-controller
      - name: Scenario — error-budget freeze then resume
        run: hack/smoke/scenario-errorbudget.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n stageset-system get all || true
          kubectl -n stageset-system logs deploy/stageset-controller --tail=300 || true
          kubectl get stageset -A || true
          kubectl -n default get events || true

  # Real NetworkPolicy ENFORCEMENT — what scenario-networkpolicy.sh cannot test,
  # because kind's default kindnet treats NetworkPolicy as a no-op. This job
  # creates a no-default-CNI kind cluster (kind-calico.yaml / kind-cilium.yaml),
  # installs a real enforcing CNI, and the chart with networkPolicy.enabled +
  # engine matching the CNI and networkPolicy.gate.from scoped to flux-system.
  # The scenario asserts the gate port is reachable from the admitted namespace
  # and (ENFORCE=1) dropped from a non-admitted one. ENFORCE=0 for the
  # allow-all-on-ports dialects (cilium/cilium, calico/calico) and the
  # clusterNetworkPolicy apply-level case (no on-kind v1alpha2 enforcer yet).
  networkpolicy-enforcement:
    name: NetworkPolicy enforced (${{ matrix.cni }} / ${{ matrix.engine }})
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - cni: calico
            engine: kubernetes
            kindcfg: kind-calico.yaml
            enforce: "1"
          - cni: calico
            engine: calico
            kindcfg: kind-calico.yaml
            enforce: "0"
          - cni: cilium
            engine: cilium
            kindcfg: kind-cilium.yaml
            enforce: "0"
          - cni: calico
            engine: clusterNetworkPolicy
            kindcfg: kind-calico.yaml
            enforce: "0"
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Build container image
        run: docker build -t ghcr.io/metio/stageset-controller:smoke .
      - name: Create kind cluster (no default CNI)
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: stageset-npe
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          config: hack/smoke/${{ matrix.kindcfg }}
          wait: "0s"
      - name: Install the enforcing CNI (${{ matrix.cni }})
        run: hack/smoke/setup-${{ matrix.cni }}.sh
      - name: Install the Network Policy API CRDs (clusterNetworkPolicy engine)
        if: matrix.engine == 'clusterNetworkPolicy'
        run: hack/smoke/setup-networkpolicy-api.sh
      - name: Load image into kind
        run: kind load docker-image ghcr.io/metio/stageset-controller:smoke --name stageset-npe
      - name: Install the released chart (NetworkPolicy enabled, engine=${{ matrix.engine }}) with the dev image
        run: |
          # The admitted namespace must exist before the policy scopes to it.
          kubectl create namespace flux-system
          helm upgrade --install stageset oci://ghcr.io/metio/helm-charts/stageset-controller \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace stageset-system --create-namespace \
            --set-string image.tag=smoke \
            --set webhook.enabled=false \
            --set networkPolicy.enabled=true \
            --set networkPolicy.engine=${{ matrix.engine }} \
            --set 'networkPolicy.gate.from[0].namespaceSelector.matchLabels.kubernetes\.io/metadata\.name=flux-system' \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/
          kubectl create clusterrolebinding stageset-smoke-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=stageset-system:stageset-controller
      - name: Scenario — NetworkPolicy enforcement
        run: ENFORCE=${{ matrix.enforce }} hack/smoke/scenario-networkpolicy-enforcement.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n stageset-system get all || true
          kubectl get networkpolicies.networking.k8s.io -A -o wide || true
          kubectl get ciliumnetworkpolicies.cilium.io -A -o wide || true
          kubectl get networkpolicies.projectcalico.org -A -o wide || true
          kubectl get clusternetworkpolicies.policy.networking.k8s.io -A -o wide || true
          kubectl -n stageset-system logs deploy/stageset-controller --tail=300 || true

  # Real service-mesh authorization ENFORCEMENT. The chart's serviceMesh engine
  # renders the mesh's authz objects (Istio AuthorizationPolicy + optional
  # PeerAuthentication; Linkerd Server / AuthorizationPolicy / MeshTLSAuthentication);
  # this installs the mesh, injects the install + client namespaces, scopes
  # serviceMesh.gate.from to the allowed identity, and asserts a meshed client
  # under that ServiceAccount reaches the gate port while a same-namespace client
  # under the default SA is rejected by the mesh (403 / reset). Needs no Flux:
  # the controller boots and the gate server still answers (404), which is all the
  # authz check needs. Allow/deny turns on the ServiceAccount alone.
  servicemesh:
    name: Service mesh authz enforced (${{ matrix.engine }})
    needs: discover
    if: needs.discover.outputs.chart_version != '' && needs.discover.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: istio
            principal: cluster.local/ns/mesh-clients/sa/mesh-reader
          - engine: linkerd
            principal: mesh-reader.mesh-clients.serviceaccount.identity.linkerd.cluster.local
    steps:
      - name: Clone Git Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Build container image
        run: docker build -t ghcr.io/metio/stageset-controller:smoke .
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          version: ${{ needs.discover.outputs.kind_latest }}
          cluster_name: stageset-mesh
          node_image: kindest/node:${{ needs.discover.outputs.k8s_latest }}
          wait: 120s
      - name: Load image into kind
        run: kind load docker-image ghcr.io/metio/stageset-controller:smoke --name stageset-mesh
      - name: Install the service mesh (${{ matrix.engine }})
        run: hack/smoke/setup-${{ matrix.engine }}.sh
      - name: Create + mesh-inject the install and client namespaces
        run: |
          for ns in stageset-system mesh-clients; do
            kubectl create namespace "$ns"
            # Mark for injection in both idioms so one step serves both engines.
            kubectl label namespace "$ns" istio-injection=enabled --overwrite
            kubectl annotate namespace "$ns" linkerd.io/inject=enabled --overwrite
          done
          # The authorized client identity. The denied client reuses the
          # namespace default SA, so allow/deny turns on the ServiceAccount alone.
          kubectl -n mesh-clients create serviceaccount mesh-reader
      - name: Install the released chart (serviceMesh enabled, engine=${{ matrix.engine }}) with the dev image
        run: |
          helm upgrade --install stageset oci://ghcr.io/metio/helm-charts/stageset-controller \
            --version "${{ needs.discover.outputs.chart_version }}" \
            --namespace stageset-system \
            --set-string image.tag=smoke \
            --set webhook.enabled=false \
            --set serviceMesh.enabled=true \
            --set serviceMesh.engine=${{ matrix.engine }} \
            --set serviceMesh.mtls=permissive \
            --set 'serviceMesh.gate.from[0].principals[0]=${{ matrix.principal }}' \
            --wait --timeout 5m
          kubectl apply --server-side --force-conflicts -f config/crd/
          kubectl create clusterrolebinding stageset-smoke-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=stageset-system:stageset-controller
      - name: Scenario — service-mesh authz enforcement (by SA identity)
        run: ENGINE=${{ matrix.engine }} hack/smoke/scenario-servicemesh.sh
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n stageset-system get all || true
          kubectl -n stageset-system get authorizationpolicies.security.istio.io,peerauthentications.security.istio.io -o yaml || true
          kubectl -n stageset-system get servers.policy.linkerd.io,authorizationpolicies.policy.linkerd.io -o yaml || true
          kubectl -n stageset-system get meshtlsauthentications.policy.linkerd.io -o yaml || true
          kubectl -n stageset-system logs deploy/stageset-controller --all-containers=true --tail=200 || true
          kubectl -n mesh-clients logs deploy/mesh-deny --all-containers=true --tail=50 || true

  system-tests:
    name: System Tests
    needs: [discover, smoke, s3, s3-seaweedfs, ha, selfsigned, scale-smoke, new-fields, rollout-gates, networkpolicy-enforcement, servicemesh]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify every job succeeded or skipped
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          bad=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | "\(.key)=\(.value.result)"')
          [ -z "$bad" ] || { echo "::error::$bad"; exit 1; }
