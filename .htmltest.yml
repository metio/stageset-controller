# htmltest config for the built documentation site. Run from the repo root after
# a site build has produced docs/public/:
#   nix develop --command website
#   nix develop --command htmltest
DirectoryPath: docs/public
# External link checking is off by default so the gate stays deterministic and
# offline (no rate limits / transient network failures). Flip to true to also
# verify outbound URLs.
CheckExternal: false
CheckInternal: true
CheckMailto: true
# Missing alt text is a real accessibility defect — keep it failing.
IgnoreAltMissing: false
