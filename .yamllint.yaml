extends: default
rules:
  # 160 is the style target, but embedded shell/jsonpath in CI scripts and
  # long values legitimately exceed it — warn rather than fail.
  line-length:
    max: 160
    level: warning
  document-start: disable
  comments:
    min-spaces-from-content: 1
  truthy:
    check-keys: false
ignore:
  - docs/public/
  # controller-gen output: machine-generated, sequence-indent style differs.
  - config/crd/
  - config/rbac/
  - config/webhook/
